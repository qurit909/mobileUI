<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>Editorial - Messages</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { "primary": "#b6004f", "surface": "#fff4f6", "on-surface": "#4a2135", "on-surface-variant": "#7d4d63" }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-surface overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">
    <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 border-b border-rose-100 flex justify-between items-center">
      <h1 class="font-bold text-primary tracking-tight text-lg">메시지</h1>
      <button class="p-2 text-primary"><span class="material-symbols-outlined">edit_square</span></button>
    </header>
    <main class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar pb-24">
      <div class="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm relative overflow-hidden border border-rose-100">
        <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary"></div>
        <img class="w-14 h-14 rounded-2xl object-cover" src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=200&q=80"/>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-baseline mb-0.5"><h4 class="font-bold text-on-surface text-sm">아우라 뷰티</h4><span class="text-[9px] font-bold text-primary">New</span></div>
          <p class="text-xs text-on-surface font-semibold truncate">미팅 일정 확인 가능하실까요?</p>
        </div>
      </div>
    </main>

    <nav class="absolute bottom-0 left-0 right-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(182,0,79,0.1)] z-50">
      <a href="index.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">home</span><span class="text-[9px] font-bold">홈</span>
      </a>
      <a href="create.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">add_circle</span><span class="text-[9px] font-bold">만들기</span>
      </a>
      <a href="messages.html" class="nav-item active flex flex-col items-center gap-1 text-primary">
        <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1">send</span><span class="text-[9px] font-bold">메시지</span>
      </a>
      <a href="profile.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">person</span><span class="text-[9px] font-bold">프로필</span>
      </a>
    </nav>
  </div>
</body>
</html>
