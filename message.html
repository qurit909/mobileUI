<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

</head>
<body class="py-0 sm:py-8">

    <main class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
      <div class="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm relative overflow-hidden border border-rose-100">
        <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-[#b6004f]"></div>

          <p class="text-xs text-zinc-600 font-semibold truncate">미팅 일정 확인 가능하실까요?</p>
        </div>
      </div>
    </main>
    <nav class="absolute bottom-0 left-0 right-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(182,0,79,0.1)] z-50">
      <a href="home.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400"><span class="material-symbols-outlined text-[24px]">home</span><span class="text-[9px] font-bold">홈</span></a>
      <a href="create.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400"><span class="material-symbols-outlined text-[24px]">add_circle</span><span class="text-[9px] font-bold">만들기</span></a>
      <a href="message.html" class="nav-item active flex flex-col items-center gap-1 text-[#b6004f]"><span class="material-symbols-outlined text-[24px]">send</span><span class="text-[9px] font-bold">메시지</span></a>
      <a href="profile.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400"><span class="material-symbols-outlined text-[24px]">person</span><span class="text-[9px] font-bold">프로필</span></a>
