<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .hide { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .post-slider { 
      display: flex; 
      overflow-x: auto; 
      scroll-snap-type: x mandatory; 
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }
    .post-slider img { 
      flex-shrink: 0; 
      width: 100%; 
      aspect-ratio: 1/1;
      object-fit: cover; 
      scroll-snap-align: start; 
      user-select: none;
      -webkit-user-drag: none;
    }
    
    .action-sheet-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
  </style>
</head>
<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-white overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">
    
    <!-- [페이지] 프로필 메인 -->
    <div id="page-profile" class="flex flex-col h-full w-full absolute inset-0 bg-white z-10">
      <header class="shrink-0 bg-white px-5 py-4 border-b border-rose-100 flex justify-between items-center">
        <h1 id="display-id" class="font-bold text-zinc-800 tracking-tight text-lg text-center flex-1 ml-8">travel_kimtaewoo</h1>
        <button onclick="toggleSettings()" class="p-2 text-zinc-800"><span class="material-symbols-outlined">menu</span></button>
      </header>
      
      <main class="flex-1 overflow-y-auto no-scrollbar pb-24">
        <div class="px-5 py-6">
          <div class="flex items-center gap-8 mb-4">
            <div class="w-20 h-20 rounded-full border-2 border-rose-100 p-1">
              <img id="main-profile-img" class="w-full h-full rounded-full object-cover" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop"/>
            </div>
            <div class="flex gap-6">
              <div class="flex flex-col items-center"><span class="font-bold text-zinc-800 text-sm">42</span><span class="text-[11px] text-zinc-500">게시물</span></div>
              <div class="flex flex-col items-center"><span class="font-bold text-zinc-800 text-sm">512</span><span class="text-[11px] text-zinc-500">팔로워</span></div>
              <div class="flex flex-col items-center"><span class="font-bold text-zinc-800 text-sm">385</span><span class="text-[11px] text-zinc-500">팔로잉</span></div>
            </div>
          </div>
          <div class="mb-4">
            <h2 id="display-name" class="font-bold text-zinc-800 text-sm">김태우</h2>
            <p id="display-job" class="text-xs text-zinc-500 font-medium mb-1">여행 작가</p>
            <p id="display-bio" class="text-xs text-zinc-600 leading-relaxed">세계/전국 각지의 아름다움을 알려드립니다</p>
          </div>
          <button onclick="openEditProfile()" class="w-full py-2 bg-zinc-100 rounded-lg text-xs font-bold text-zinc-800 active:scale-[0.98] transition-transform">프로필 편집</button>
        </div>

        <div id="post-grid" class="grid grid-cols-3 gap-0.5 border-t border-rose-50"></div>
      </main>

      <nav class="shrink-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl border-t border-rose-100 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(182,0,79,0.05)]">
        <div class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer"><span class="material-symbols-outlined text-[24px]">home</span><span class="text-[9px] font-bold">홈</span></div>
        <div class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer"><span class="material-symbols-outlined text-[24px]">add_circle</span><span class="text-[9px] font-bold">만들기</span></div>
        <div class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer"><span class="material-symbols-outlined text-[24px]">send</span><span class="text-[9px] font-bold">메시지</span></div>
        <div class="nav-item active flex flex-col items-center gap-1 text-[#b6004f] cursor-pointer"><span class="material-symbols-outlined text-[24px]">person</span><span class="text-[9px] font-bold">프로필</span></div>
      </nav>
    </div>

    <!-- [페이지] 게시물 상세 -->
    <div id="page-post-detail" class="absolute inset-0 bg-white z-20 hide flex flex-col fade-in">
      <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4">
        <button onclick="closePost()" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
        <h1 class="font-bold text-zinc-800 text-sm">게시물</h1>
      </header>
      <main class="flex-1 overflow-y-auto no-scrollbar">
        <div class="flex items-center justify-between p-3">
          <div class="flex items-center gap-3">
            <img class="post-owner-img w-8 h-8 rounded-full object-cover" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop"/>
            <span class="font-bold text-xs text-zinc-800">travel_kimtaewoo</span>
          </div>
          <span class="material-symbols-outlined text-zinc-400">more_horiz</span>
        </div>
        <div class="relative overflow-hidden">
          <div id="post-images" class="post-slider no-scrollbar"></div>
          <div id="post-counter" class="absolute top-4 right-4 bg-black/60 text-white text-[10px] px-2 py-1 rounded-full font-bold">1/5</div>
          <div id="post-indicator" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 pointer-events-none"></div>
        </div>
        <div class="p-4 space-y-3">
          <div class="flex justify-between">
            <div class="flex gap-4">
              <span id="heart-icon" class="material-symbols-outlined text-zinc-800 cursor-pointer active:scale-125 transition-all select-none" onclick="toggleLike()">favorite</span>
              <span class="material-symbols-outlined text-zinc-800 cursor-pointer">chat_bubble</span>
              <span class="material-symbols-outlined text-zinc-800 cursor-pointer">send</span>
            </div>
            <span class="material-symbols-outlined text-zinc-800 cursor-pointer">bookmark</span>
          </div>
          <div class="space-y-1">
            <p id="post-likes" class="text-xs font-bold text-zinc-800"></p>
            <div class="space-y-2">
              <p id="post-content" class="text-xs text-zinc-700 leading-relaxed"></p>
              <p id="post-tags" class="text-xs text-blue-600 font-medium italic"></p>
            </div>
          </div>
          <!-- 댓글 섹션 -->
          <div id="comment-list" class="space-y-4 pt-3 border-t border-zinc-50"></div>
          <p class="text-[10px] text-zinc-400 uppercase tracking-tighter pt-2">방금 전 • 파리, 프랑스</p>
        </div>
      </main>
      
      <!-- 답글 안내 칩 (답글 모드일 때만 표시) -->
      <div id="reply-info" class="hide px-4 py-2 bg-zinc-50 border-t border-rose-50 flex justify-between items-center">
        <span id="reply-target-text" class="text-[10px] text-zinc-500"></span>
        <button onclick="cancelReply()" class="material-symbols-outlined text-sm text-zinc-400">close</button>
      </div>

      <!-- 댓글 입력창 -->
      <footer class="p-3 border-t border-rose-50 flex items-center gap-3 bg-white">
        <img class="post-owner-img w-7 h-7 rounded-full object-cover" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop"/>
        <input id="comment-input" type="text" placeholder="댓글 달기..." class="flex-1 bg-zinc-50 border-none rounded-full px-4 py-2 text-xs focus:ring-1 focus:ring-rose-200 outline-none" onkeypress="if(event.key==='Enter') addComment()"/>
        <button onclick="addComment()" class="text-xs font-bold text-[#b6004f] pr-1">게시</button>
      </footer>
    </div>

    <!-- [모달] 프로필 편집 -->
    <div id="modal-edit-profile" class="absolute inset-0 bg-white z-40 hide fade-in flex flex-col">
      <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex justify-between items-center">
        <button onclick="closeEditProfile()" class="text-sm font-medium text-zinc-500">취소</button>
        <h1 class="font-bold text-zinc-800 text-sm">프로필 편집</h1>
        <button onclick="saveProfile()" class="text-sm font-bold text-[#b6004f]">완료</button>
      </header>
      <main class="flex-1 overflow-y-auto p-5 space-y-6">
        <div class="flex flex-col items-center gap-2">
          <img id="edit-profile-preview" class="w-20 h-20 rounded-full object-cover border border-zinc-100" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop"/>
          <button onclick="openPhotoActions()" class="text-xs font-bold text-[#b6004f]">프로필 사진 변경</button>
          <input type="file" id="photo-input" class="hidden" accept="image/*" onchange="handlePhotoSelect(event)">
        </div>
        <div class="space-y-4">
          <div class="space-y-1"><label class="text-[11px] font-bold text-zinc-400 ml-1">이름</label><input id="input-name" type="text" value="김태우" class="w-full bg-zinc-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-rose-200"/></div>
          <div class="space-y-1"><label class="text-[11px] font-bold text-zinc-400 ml-1">사용자 이름</label><input id="input-id" type="text" value="travel_kimtaewoo" class="w-full bg-zinc-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-rose-200"/></div>
          <div class="space-y-1"><label class="text-[11px] font-bold text-zinc-400 ml-1">직업</label><input id="input-job" type="text" value="여행 작가" class="w-full bg-zinc-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-rose-200"/></div>
          <div class="space-y-1"><label class="text-[11px] font-bold text-zinc-400 ml-1">소개</label><textarea id="input-bio" rows="3" class="w-full bg-zinc-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-rose-200 resize-none">세계/전국 각지의 아름다움을 알려드립니다</textarea></div>
        </div>
      </main>
    </div>

    <!-- [액션 시트] 사진 변경 메뉴 -->
    <div id="action-sheet-photo" class="action-sheet-overlay hide fade-in z-[60]" onclick="closePhotoActions()">
      <div class="w-full bg-white rounded-t-[2rem] p-6 slide-up space-y-4" onclick="event.stopPropagation()">
        <div class="w-10 h-1.5 bg-zinc-200 rounded-full mx-auto mb-2"></div>
        <h3 class="text-center font-bold text-zinc-800 mb-6">프로필 사진 변경</h3>
        <button onclick="triggerPhotoInput()" class="w-full flex items-center gap-4 py-3 px-2 active:bg-zinc-50 rounded-xl transition-colors">
          <span class="material-symbols-outlined text-blue-500">photo_library</span>
          <span class="text-sm font-semibold text-zinc-700">갤러리에서 선택</span>
        </button>
        <button class="w-full flex items-center gap-4 py-3 px-2 active:bg-zinc-50 rounded-xl transition-colors">
          <span class="material-symbols-outlined text-green-500">photo_camera</span>
          <span class="text-sm font-semibold text-zinc-700">카메라로 촬영</span>
        </button>
        <button onclick="removeCurrentPhoto()" class="w-full flex items-center gap-4 py-3 px-2 active:bg-zinc-50 rounded-xl transition-colors">
          <span class="material-symbols-outlined text-red-500">delete</span>
          <span class="text-sm font-semibold text-red-500">현재 사진 삭제</span>
        </button>
        <div class="pt-2">
           <button onclick="closePhotoActions()" class="w-full py-4 text-sm font-bold text-zinc-400">취소</button>
        </div>
      </div>
    </div>

    <!-- [사이드 메뉴] 설정 -->
    <div id="side-settings" class="absolute inset-0 bg-black/30 z-50 hide fade-in flex justify-end" onclick="toggleSettings()">
      <div class="w-3/4 h-full bg-white slide-up p-6" onclick="event.stopPropagation()">
        <h2 class="font-bold text-zinc-800 text-lg mb-6">설정 및 활동</h2>
        <div class="space-y-4">
          <div class="flex items-center gap-3 text-zinc-700"><span class="material-symbols-outlined">settings</span><span class="text-sm font-medium">설정</span></div>
          <div class="flex items-center gap-3 text-zinc-700"><span class="material-symbols-outlined">history</span><span class="text-sm font-medium">내 활동</span></div>
          <div class="flex items-center gap-3 text-zinc-700"><span class="material-symbols-outlined">bookmark</span><span class="text-sm font-medium">저장됨</span></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let currentPostIndex = 0;
    let replyTarget = null;
    const MY_USER_ID = 'travel_kimtaewoo';

    const postsData = [
      { 
        images: [
          "https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80",
          "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80",
          "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80",
          "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80",
          "https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80"
        ], 
        likes: 1204, 
        isLiked: false,
        content: "여름의 끝자락에서 만난 드넓은 초원입니다. 공기가 너무 맑아서 힐링 제대로 했어요. 다시 방문하고 싶은 곳 1순위!", 
        tags: "#여행 #풍경 #힐링 #여름휴가 #자연", 
        comments: [
          { id: 1, user: "nature_lover", text: "와 여기 어딘가요? 정보 좀 부탁드려요!" },
          { id: 2, user: "photo_jason", text: "색감이 너무 예술이네요 👍" },
          { id: 3, user: "travel_bug", text: "와... 진짜 가보고 싶어요" }
        ] 
      },
      { 
        images: [
          "https://images.unsplash.com/photo-1493246507139-91e8bef99c02?q=80",
          "https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80",
          "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80",
          "https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80",
          "https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80"
        ], 
        likes: 852, 
        isLiked: false,
        content: "웅장한 산맥 아래 흐르는 고요한 호수. 시간이 멈춘 것 같은 기분이었습니다. 대자연의 경이로움에 압도당했어요.", 
        tags: "#산수화 #호수뷰 #캠핑 #백패킹 #대자연", 
        comments: [
          { id: 4, user: "hiker_kim", text: "등산 코스 난이도는 어떤가요?" },
          { id: 5, user: "mountain_man", text: "캬 역시 산이 최고입니다" },
          { id: 6, user: "camping_girl", text: "저기서 캠핑하면 어떤 기분일까요" }
        ] 
      },
      { 
        images: [
          "https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80",
          "https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?q=80",
          "https://images.unsplash.com/photo-1511497584788-876760111969?q=80",
          "https://images.unsplash.com/photo-1454496522485-0a62b4a3a1d4?q=80",
          "https://images.unsplash.com/photo-1486915307544-b1ae220abcaf?q=80"
        ], 
        likes: 2430, 
        isLiked: false,
        content: "구름을 뚫고 솟아오른 설산. 자연의 위대함을 다시 한번 느낍니다. 매 순간이 감동이었던 알프스 여행.", 
        tags: "#만년설 #알프스 #자연 #유럽 #스키", 
        comments: [
          { id: 7, user: "winter_fan", text: "보기만 해도 시원해지네요 ❄️" },
          { id: 8, user: "ice_cream", text: "저기 진짜 춥나요?" },
          { id: 9, user: "sky_high", text: "구름 위를 걷는 기분일듯" }
        ] 
      }
    ];

    function initGrid() {
      const grid = document.getElementById('post-grid');
      grid.innerHTML = postsData.map((p, i) => `
        <div onclick="openPost(${i})" class="aspect-square bg-zinc-100 overflow-hidden cursor-pointer relative active:opacity-80 transition-opacity">
          <img class="w-full h-full object-cover" src="${p.images[0]}"/>
          <span class="absolute top-2 right-2 text-white drop-shadow-md"><span class="material-symbols-outlined text-sm">filter_none</span></span>
        </div>
      `).join('');
    }

    function openPost(index) {
      currentPostIndex = index;
      cancelReply();
      const post = postsData[index];
      const slider = document.getElementById('post-images');
      const indicator = document.getElementById('post-indicator');
      const counter = document.getElementById('post-counter');
      
      slider.innerHTML = post.images.map(img => `<img src="${img}"/>`).join('');
      indicator.innerHTML = post.images.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full ${i===0?'bg-white':'bg-white/40'} transition-all"></div>`).join('');
      counter.innerText = `1/${post.images.length}`;
      
      slider.onscroll = () => {
        const idx = Math.round(slider.scrollLeft / slider.offsetWidth);
        Array.from(indicator.children).forEach((dot, i) => {
          dot.className = `w-1.5 h-1.5 rounded-full ${i===idx?'bg-white':'bg-white/40'} transition-all`;
        });
        counter.innerText = `${idx + 1}/${post.images.length}`;
      };

      updateLikeUI();
      document.getElementById('post-content').innerText = post.content;
      document.getElementById('post-tags').innerText = post.tags;
      renderComments();

      document.getElementById('page-post-detail').classList.remove('hide');
    }

    function toggleLike() {
      const post = postsData[currentPostIndex];
      post.isLiked = !post.isLiked;
      post.likes += post.isLiked ? 1 : -1;
      updateLikeUI();
    }

    function updateLikeUI() {
      const post = postsData[currentPostIndex];
      const heart = document.getElementById('heart-icon');
      const likeText = document.getElementById('post-likes');
      
      heart.style.color = post.isLiked ? '#ef4444' : '#27272a';
      heart.style.fontVariationSettings = post.isLiked ? "'FILL' 1" : "'FILL' 0";
      likeText.innerText = `좋아요 ${post.likes.toLocaleString()}개`;
    }

    function renderComments() {
      const post = postsData[currentPostIndex];
      const commentList = document.getElementById('comment-list');
      if (post.comments.length > 0) {
        commentList.innerHTML = post.comments.map((c, idx) => `
          <div class="flex flex-col gap-1 fade-in">
            <div class="flex items-start justify-between group">
              <div class="flex gap-2 text-xs flex-1">
                <span class="font-bold text-zinc-800 shrink-0">${c.user}</span>
                <span class="text-zinc-600 leading-snug">${c.text}</span>
              </div>
              <div class="flex gap-2 items-center opacity-0 group-hover:opacity-100 transition-opacity ml-2">
                ${c.user === MY_USER_ID ? 
                  `<button onclick="deleteComment(${idx})" class="text-[10px] text-red-400 font-bold hover:text-red-600 transition-colors">삭제</button>` : 
                  `<button onclick="setReply('${c.user}')" class="text-[10px] text-zinc-400 font-bold hover:text-zinc-700 transition-colors">답글</button>`
                }
              </div>
            </div>
            <div class="flex gap-3 ml-10 mt-0.5">
               <span class="text-[9px] text-zinc-400 font-medium">좋아요 1개</span>
               ${c.user !== MY_USER_ID ? `<button onclick="setReply('${c.user}')" class="text-[9px] text-zinc-400 font-bold">답글 달기</button>` : ''}
            </div>
          </div>
        `).join('');
      } else {
        commentList.innerHTML = '<p class="text-[10px] text-zinc-400 py-2">첫 댓글을 남겨보세요!</p>';
      }
    }

    function setReply(userName) {
      replyTarget = userName;
      const replyInfo = document.getElementById('reply-info');
      const replyText = document.getElementById('reply-target-text');
      const input = document.getElementById('comment-input');
      
      replyText.innerText = `${userName}님에게 답글 남기는 중...`;
      replyInfo.classList.remove('hide');
      input.focus();
      input.value = `@${userName} `;
    }

    function cancelReply() {
      replyTarget = null;
      document.getElementById('reply-info').classList.add('hide');
      const input = document.getElementById('comment-input');
      if(input.value.startsWith('@')) input.value = '';
    }

    function deleteComment(index) {
      const post = postsData[currentPostIndex];
      post.comments.splice(index, 1);
      renderComments();
    }

    function addComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (text) {
        const post = postsData[currentPostIndex];
        post.comments.push({ 
          id: Date.now(), 
          user: MY_USER_ID, 
          text: text 
        });
        input.value = '';
        cancelReply();
        renderComments();
        
        const main = document.querySelector('#page-post-detail main');
        main.scrollTo({ top: main.scrollHeight, behavior: 'smooth' });
      }
    }

    function openPhotoActions() { document.getElementById('action-sheet-photo').classList.remove('hide'); }
    function closePhotoActions() { document.getElementById('action-sheet-photo').classList.add('hide'); }
    function triggerPhotoInput() { document.getElementById('photo-input').click(); closePhotoActions(); }
    
    function handlePhotoSelect(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('edit-profile-preview').src = e.target.result;
          document.getElementById('main-profile-img').src = e.target.result;
          const ownerImages = document.querySelectorAll('.post-owner-img');
          ownerImages.forEach(img => img.src = e.target.result);
        };
        reader.readAsDataURL(file);
      }
    }
    
    function removeCurrentPhoto() {
      const defaultImg = "https://ui-avatars.com/api/?name=%EA%B9%80%ED%83%9C%EC%9A%B0&background=F3F4F6&color=b6004f";
      document.getElementById('edit-profile-preview').src = defaultImg;
      document.getElementById('main-profile-img').src = defaultImg;
      closePhotoActions();
    }

    function closePost() { document.getElementById('page-post-detail').classList.add('hide'); }
    function openEditProfile() { document.getElementById('modal-edit-profile').classList.remove('hide'); }
    function closeEditProfile() { document.getElementById('modal-edit-profile').classList.add('hide'); }
    function saveProfile() {
      document.getElementById('display-name').innerText = document.getElementById('input-name').value;
      document.getElementById('display-id').innerText = document.getElementById('input-id').value;
      const newId = document.getElementById('input-id').value;
      // 사용자 이름 변경 시 MY_USER_ID 업데이트 (댓글 삭제 로직용)
      // 실제 앱이라면 전역 상태로 관리하겠지만 여기서는 간단히 처리
      closeEditProfile();
    }
    function toggleSettings() { document.getElementById('side-settings').classList.toggle('hide'); }

    window.onload = initGrid;
  </script>
</body>
</html>
