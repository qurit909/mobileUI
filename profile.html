<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .hide { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-white overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">
    
    <!-- [페이지] 프로필 메인 -->
    <div id="page-profile" class="flex flex-col h-full w-full absolute inset-0 bg-white z-10">
      <header class="shrink-0 bg-white px-5 py-4 border-b border-rose-100 flex justify-between items-center">
        <h1 class="font-bold text-zinc-800 tracking-tight text-lg text-center flex-1 ml-8">travel_kimtaewoo</h1>
        <button onclick="toggleSettings()" class="p-2 text-zinc-800"><span class="material-symbols-outlined">menu</span></button>
      </header>
      
      <main class="flex-1 overflow-y-auto no-scrollbar pb-24">
        <div class="px-5 py-6">
          <div class="flex items-center justify-between mb-6">
            <div class="w-24 h-24 rounded-full border-2 border-rose-100 p-1 shrink-0">
              <img class="w-full h-full rounded-full object-cover" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop"/>
            </div>
            <div class="flex flex-1 justify-around px-2">
              <div class="flex flex-col items-center cursor-default"><span class="font-extrabold text-zinc-800 text-xl">4</span><span class="text-[12px] font-medium text-zinc-400">게시물</span></div>
              <div onclick="openSubLayer('팔로워')" class="flex flex-col items-center cursor-pointer active:opacity-60 transition-opacity"><span class="font-extrabold text-zinc-800 text-xl">512</span><span class="text-[12px] font-medium text-zinc-400">팔로워</span></div>
              <div onclick="openSubLayer('팔로잉')" class="flex flex-col items-center cursor-pointer active:opacity-60 transition-opacity"><span class="font-extrabold text-zinc-800 text-xl">385</span><span class="text-[12px] font-medium text-zinc-400">팔로잉</span></div>
            </div>
          </div>
          <div class="mb-5">
            <h2 class="font-bold text-zinc-800 text-base">김태우</h2>
            <p class="text-xs text-[#b6004f] font-semibold mb-1">여행 작가</p>
            <p class="text-sm text-zinc-600 leading-relaxed">세계/전국 각지의 아름다움을 알려드립니다</p>
          </div>
          <button onclick="openEditProfile()" class="w-full py-2.5 bg-zinc-100 rounded-xl text-sm font-bold text-zinc-800 active:scale-[0.98] transition-transform">프로필 편집</button>
        </div>
        <div id="post-grid" class="grid grid-cols-3 gap-0.5 border-t border-rose-50"></div>
      </main>

      <nav class="shrink-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl border-t border-rose-100 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(182,0,79,0.05)]">
        <div class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer"><span class="material-symbols-outlined text-[24px]">home</span><span class="text-[9px] font-bold">홈</span></div>
        <div class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer"><span class="material-symbols-outlined text-[24px]">explore</span><span class="text-[9px] font-bold">탐색</span></div>
        <div class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer"><span class="material-symbols-outlined text-[24px]">add_circle</span><span class="text-[9px] font-bold">만들기</span></div>
        <div class="nav-item active flex flex-col items-center gap-1 text-[#b6004f] cursor-pointer"><span class="material-symbols-outlined text-[24px]">person</span><span class="text-[9px] font-bold">프로필</span></div>
      </nav>
    </div>

    <!-- [레이어] 설정 메뉴 -->
    <div id="layer-settings" class="absolute inset-0 bg-white z-[70] hide flex flex-col slide-in-right">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4">
            <button onclick="closeLayer('layer-settings')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
            <h1 class="font-bold text-zinc-800 text-sm">설정 및 개인정보</h1>
        </header>
        <main class="flex-1 overflow-y-auto">
            <div class="p-4 space-y-6">
                <div>
                    <h3 class="text-[11px] font-bold text-zinc-400 uppercase ml-1 mb-2">내 계정</h3>
                    <div class="bg-zinc-50 rounded-2xl divide-y divide-zinc-200/50">
                        <button onclick="openSubLayer('개인정보 보호')" class="w-full p-4 flex justify-between items-center active:bg-zinc-100 transition-colors rounded-t-2xl">
                            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-zinc-600">lock</span><span class="text-sm text-zinc-700">개인정보 보호</span></div>
                            <span class="material-symbols-outlined text-zinc-400">chevron_right</span>
                        </button>
                        <button onclick="openSubLayer('알림 설정')" class="w-full p-4 flex justify-between items-center active:bg-zinc-100 transition-colors rounded-b-2xl">
                            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-zinc-600">notifications</span><span class="text-sm text-zinc-700">알림 설정</span></div>
                            <span class="material-symbols-outlined text-zinc-400">chevron_right</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- [레이어] 내 활동 -->
    <div id="layer-activity" class="absolute inset-0 bg-white z-[70] hide flex flex-col slide-in-right">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4">
            <button onclick="closeLayer('layer-activity')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
            <h1 class="font-bold text-zinc-800 text-sm">내 활동</h1>
        </header>
        <main class="flex-1 overflow-y-auto">
            <div class="p-4 space-y-4">
                <button onclick="openSubLayer('좋아요한 게시물')" class="w-full bg-zinc-50 p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-rose-100 rounded-full flex items-center justify-center text-rose-500"><span class="material-symbols-outlined">favorite</span></div>
                        <div class="text-left"><p class="text-sm font-bold text-zinc-800">반응</p><p class="text-xs text-zinc-500">좋아요, 댓글 등</p></div>
                    </div>
                    <span class="material-symbols-outlined text-zinc-400">chevron_right</span>
                </button>
            </div>
        </main>
    </div>

    <!-- [레이어] 저장됨 -->
    <div id="layer-saved" class="absolute inset-0 bg-white z-[70] hide flex flex-col slide-in-right">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="closeLayer('layer-saved')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
                <h1 class="font-bold text-zinc-800 text-sm">저장됨</h1>
            </div>
            <button class="material-symbols-outlined text-[#b6004f]">add</button>
        </header>
        <main class="flex-1 overflow-y-auto p-4">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="openSubLayer('모든 게시물')" class="space-y-2 cursor-pointer">
                    <div class="aspect-square rounded-2xl overflow-hidden bg-zinc-100 grid grid-cols-2 gap-0.5">
                        <img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=200"/>
                        <img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1519046904884-53103b34b206?q=80&w=200"/>
                        <img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=200"/>
                        <img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1493246507139-91e8bef99c02?q=80&w=200"/>
                    </div>
                    <p class="text-xs font-bold text-zinc-800 ml-1">모든 게시물</p>
                </div>
            </div>
        </main>
    </div>

    <!-- [서브 레이어] 3단계 상세 -->
    <div id="layer-sub-detail" class="absolute inset-0 bg-white z-[80] hide flex flex-col slide-in-right">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4 bg-white">
            <button onclick="closeLayer('layer-sub-detail')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
            <h1 id="sub-title" class="font-bold text-zinc-800 text-sm">상세</h1>
        </header>
        <main id="sub-content" class="flex-1 overflow-y-auto p-5 text-sm text-zinc-600 leading-relaxed no-scrollbar"></main>
    </div>

    <!-- [사이드 바] (정책 안내 통합) -->
    <div id="side-settings" class="absolute inset-0 bg-black/30 z-50 hide fade-in flex justify-end" onclick="toggleSettings()">
      <div class="w-3/4 h-full bg-white slide-in-right p-6" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-extrabold text-zinc-800 text-xl">설정 및 활동</h2>
            <button onclick="toggleSettings()" class="material-symbols-outlined text-zinc-400">close</button>
        </div>
        <div class="space-y-2">
          <button onclick="openLayer('layer-settings')" class="w-full flex items-center justify-between p-4 hover:bg-zinc-50 rounded-2xl group transition-all">
            <div class="flex items-center gap-4"><span class="material-symbols-outlined text-zinc-700 text-[20px]">settings</span><span class="text-sm font-semibold">설정 및 개인정보</span></div>
            <span class="material-symbols-outlined text-zinc-300 group-hover:translate-x-1 transition-transform">chevron_right</span>
          </button>
          <button onclick="openLayer('layer-activity')" class="w-full flex items-center justify-between p-4 hover:bg-zinc-50 rounded-2xl group transition-all">
            <div class="flex items-center gap-4"><span class="material-symbols-outlined text-zinc-700 text-[20px]">history</span><span class="text-sm font-semibold">내 활동</span></div>
            <span class="material-symbols-outlined text-zinc-300 group-hover:translate-x-1 transition-transform">chevron_right</span>
          </button>
          <button onclick="openLayer('layer-saved')" class="w-full flex items-center justify-between p-4 hover:bg-zinc-50 rounded-2xl group transition-all">
            <div class="flex items-center gap-4"><span class="material-symbols-outlined text-zinc-700 text-[20px]">bookmark</span><span class="text-sm font-semibold">저장됨</span></div>
            <span class="material-symbols-outlined text-zinc-300 group-hover:translate-x-1 transition-transform">chevron_right</span>
          </button>
          <!-- 강조된 정책 안내 버튼 -->
          <div class="pt-4 mt-4 border-t border-zinc-100">
            <button onclick="openSubLayer('정책 안내')" class="w-full flex items-center justify-between p-4 bg-rose-50/50 hover:bg-rose-50 rounded-2xl group transition-all">
              <div class="flex items-center gap-4 text-rose-600"><span class="material-symbols-outlined text-[20px]">verified_user</span><span class="text-sm font-bold">정책 안내</span></div>
              <span class="material-symbols-outlined text-rose-300 group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- [페이지] 게시물 상세 -->
    <div id="page-post-detail" class="absolute inset-0 bg-white z-20 hide flex flex-col fade-in">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4">
          <button onclick="closeLayer('page-post-detail')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
          <h1 class="font-bold text-zinc-800 text-sm">게시물</h1>
        </header>
        <main id="post-detail-main" class="flex-1 overflow-y-auto no-scrollbar pb-20"></main>
    </div>

  </div>

  <script>
    const postsData = [
      { images: ["https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80"], likes: 1204, content: "여름의 끝자락에서 만난 드넓은 초원입니다.", tags: "#여행 #풍경" },
      { images: ["https://images.unsplash.com/photo-1493246507139-91e8bef99c02?q=80"], likes: 852, content: "웅장한 산맥 아래 흐르는 고요한 호수.", tags: "#호수뷰 #캠핑" },
      { images: ["https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80"], likes: 2430, content: "구름을 뚫고 솟아오른 설산.", tags: "#만년설 #알프스" },
      { images: ["https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80"], likes: 1540, content: "도심 속 힐링 스팟을 찾았습니다.", tags: "#도심숲 #산책" }
    ];

    function initGrid() {
      const grid = document.getElementById('post-grid');
      grid.innerHTML = postsData.map((p, i) => `
        <div onclick="openPost(${i})" class="aspect-square bg-zinc-100 overflow-hidden cursor-pointer active:opacity-80 transition-opacity">
          <img class="w-full h-full object-cover" src="${p.images[0]}"/>
        </div>
      `).join('');
    }

    function openPost(index) {
      const post = postsData[index];
      const main = document.getElementById('post-detail-main');
      main.innerHTML = `
        <div class="flex items-center gap-3 p-3">
            <img class="w-8 h-8 rounded-full object-cover" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200"/>
            <span class="font-bold text-xs text-zinc-800">travel_kimtaewoo</span>
        </div>
        <img class="w-full aspect-square object-cover" src="${post.images[0]}"/>
        <div class="p-4 space-y-2">
            <div class="flex gap-4 mb-2"><span class="material-symbols-outlined">favorite</span><span class="material-symbols-outlined">chat_bubble</span></div>
            <p class="text-xs font-bold text-zinc-800">좋아요 ${post.likes.toLocaleString()}개</p>
            <p class="text-xs text-zinc-700">${post.content}</p>
            <p class="text-xs text-blue-500 italic">${post.tags}</p>
        </div>
      `;
      document.getElementById('page-post-detail').classList.remove('hide');
    }

    function toggleSettings() {
      const el = document.getElementById('side-settings');
      el.classList.toggle('hide');
    }

    function openLayer(id) {
      if(!document.getElementById('side-settings').classList.contains('hide')) toggleSettings();
      document.getElementById(id).classList.remove('hide');
    }

    function closeLayer(id) {
      document.getElementById(id).classList.add('hide');
    }

    function openSubLayer(title) {
        if(!document.getElementById('side-settings').classList.contains('hide')) toggleSettings();
        document.getElementById('sub-title').innerText = title;
        const content = document.getElementById('sub-content');
        
        if(title === '좋아요한 게시물') {
            content.innerHTML = `<div class="grid grid-cols-3 gap-1">${Array(15).fill(0).map((_, i) => `<img class="aspect-square object-cover bg-zinc-100 rounded" src="https://picsum.photos/id/${i+20}/200/200"/>`).join('')}</div>`;
        } else if(title === '정책 안내') {
            content.innerHTML = `
                <div class="space-y-8 fade-in">
                    <section class="space-y-3">
                        <div class="flex items-center gap-2 text-rose-500 mb-1">
                            <span class="material-symbols-outlined">payments</span>
                            <h2 class="font-bold text-base">수수료 정책</h2>
                        </div>
                        <div class="bg-rose-50 p-5 rounded-2xl border border-rose-100">
                            <p class="text-sm text-zinc-700 leading-relaxed">
                                본 플랫폼 내에서 발생하는 모든 거래 금액에 대해 <strong class="text-rose-600 underline">거래금액의 1.7%</strong>가 서비스 운영 수수료로 부과됩니다. 
                                <br><br><span class="text-[11px] text-rose-400 font-medium">* 프로모션 기간 동안 변동될 수 있습니다.</span>
                            </p>
                        </div>
                    </section>
                    
                    <section class="space-y-4">
                        <div class="flex items-center gap-2 text-zinc-800 mb-1">
                            <span class="material-symbols-outlined">gavel</span>
                            <h2 class="font-bold text-base">법적 책임 관련</h2>
                        </div>
                        <div class="space-y-4 px-1">
                            <div class="flex gap-3">
                                <span class="bg-zinc-800 text-white w-5 h-5 rounded-full flex items-center justify-center shrink-0 text-[10px] font-bold">1</span>
                                <p class="text-xs text-zinc-500 leading-relaxed">이용자 간의 거래 과정에서 발생하는 모든 분쟁에 대한 책임은 당사자에게 있으며, 플랫폼은 중개 시스템의 안정성만을 보장합니다.</p>
                            </div>
                            <div class="flex gap-3">
                                <span class="bg-zinc-800 text-white w-5 h-5 rounded-full flex items-center justify-center shrink-0 text-[10px] font-bold">2</span>
                                <p class="text-xs text-zinc-500 leading-relaxed">타인의 저작권을 침해하거나 허위 정보를 유포하여 발생하는 법적 책임은 해당 게시물을 작성한 이용자 본인에게 귀속됩니다.</p>
                            </div>
                        </div>
                    </section>
                    <div class="pt-10 text-center"><p class="text-[10px] text-zinc-300 font-medium">최종 업데이트: 2024년 05월 20일</p></div>
                </div>
            `;
        } else if(title === '개인정보 보호') {
            content.innerHTML = `
                <div class="space-y-6">
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl">
                        <div><p class="font-bold text-zinc-800">비공개 계정</p><p class="text-[11px] text-zinc-400">승인된 팔로워만 내 게시물 조회 가능</p></div>
                        <div class="w-12 h-6 bg-rose-500 rounded-full relative shadow-inner"><div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl">
                        <div><p class="font-bold text-zinc-800">활동 상태 표시</p><p class="text-[11px] text-zinc-400">현재 활동 중인지 다른 사람이 확인 가능</p></div>
                        <div class="w-12 h-6 bg-zinc-300 rounded-full relative"><div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl">
                        <div><p class="font-bold text-zinc-800">메시지 수신 허용</p><p class="text-[11px] text-zinc-400">내가 팔로우하는 사람에게만 메시지 수신</p></div>
                        <div class="w-12 h-6 bg-rose-500 rounded-full relative shadow-inner"><div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                    </div>
                </div>
            `;
        } else if(title === '알림 설정') {
            content.innerHTML = `
                <div class="space-y-6">
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl">
                        <div><p class="font-bold text-zinc-800">푸시 알림</p><p class="text-[11px] text-zinc-400">새로운 소식을 푸시로 즉시 받기</p></div>
                        <div class="w-12 h-6 bg-rose-500 rounded-full relative shadow-inner"><div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl">
                        <div><p class="font-bold text-zinc-800">이메일 알림</p><p class="text-[11px] text-zinc-400">중요 활동을 메일로 요약 받기</p></div>
                        <div class="w-12 h-6 bg-zinc-300 rounded-full relative"><div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl">
                        <div><p class="font-bold text-zinc-800">방해 금지 모드</p><p class="text-[11px] text-zinc-400">밤 10시 이후 알림 끄기</p></div>
                        <div class="w-12 h-6 bg-zinc-300 rounded-full relative"><div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full"></div></div>
                    </div>
                </div>
            `;
        } else if(title === '팔로워' || title === '팔로잉') {
            const list = title === '팔로워' ? 
                ['여행자_서울', '클라이머', '푸드파이터', '제주러버', '산악인'] : 
                ['공식계정', '카메라리뷰', '세계여행가', '캠핑의달인'];
            content.innerHTML = `
                <div class="space-y-4">
                    ${list.map((name, i) => `
                        <div class="flex items-center justify-between p-2">
                            <div class="flex items-center gap-3">
                                <img class="w-10 h-10 rounded-full bg-zinc-100 object-cover" src="https://picsum.photos/id/${i+100}/100/100"/>
                                <div><p class="text-xs font-bold text-zinc-800">${name}</p><p class="text-[10px] text-zinc-400">추천 여행지 공유 중</p></div>
                            </div>
                            <button class="px-4 py-1.5 bg-zinc-100 rounded-lg text-[11px] font-bold text-zinc-600">${title === '팔로워' ? '삭제' : '팔로잉'}</button>
                        </div>
                    `).join('')}
                </div>
            `;
        } else if(title === '모든 게시물') {
            content.innerHTML = `<div class="grid grid-cols-3 gap-0.5">${Array(9).fill(0).map((_, i) => `<img class="aspect-square object-cover bg-zinc-100" src="https://picsum.photos/id/${i+50}/200/200"/>`).join('')}</div>`;
        } else {
            content.innerHTML = `<div class="flex flex-col items-center justify-center py-20 gap-4 text-zinc-200"><span class="material-symbols-outlined text-6xl">hourglass_empty</span><p class="text-zinc-400 text-xs">콘텐츠를 준비 중입니다.</p></div>`;
        }
        
        document.getElementById('layer-sub-detail').classList.remove('hide');
    }

    function openEditProfile() {
        openSubLayer('프로필 편집');
        const content = document.getElementById('sub-content');
        content.innerHTML = `
            <div class="space-y-6">
                <div class="flex flex-col items-center gap-3">
                    <img class="w-20 h-20 rounded-full object-cover border border-zinc-100" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200"/>
                    <button class="text-xs font-bold text-[#b6004f]">프로필 사진 변경</button>
                </div>
                <div class="space-y-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold text-zinc-400 ml-1">이름</label><input type="text" value="김태우" class="w-full bg-zinc-50 border-none rounded-xl px-4 py-3 text-sm"/></div>
                </div>
                <button onclick="closeLayer('layer-sub-detail')" class="w-full py-3 bg-[#b6004f] text-white rounded-xl font-bold text-sm">저장하기</button>
            </div>
        `;
    }

    window.onload = initGrid;
  </script>
</body>
</html>
