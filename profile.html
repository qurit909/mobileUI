<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>Editorial - Profile</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { "primary": "#b6004f", "surface": "#fff4f6", "on-surface": "#4a2135", "on-surface-variant": "#7d4d63", "surface-container-low": "#ffecf2" }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .insta-grid div { aspect-ratio: 1 / 1; overflow: hidden; background-color: #eee; }
    .insta-grid img { width: 100%; height: 100%; object-fit: cover; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-surface overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">
    <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-rose-100 z-10">
      <span class="font-black text-on-surface tracking-tight">nayoung_visual</span>
      <button class="p-2 text-primary"><span class="material-symbols-outlined">menu</span></button>
    </header>
    <main class="flex-1 overflow-y-auto hide-scrollbar pb-24 bg-white">
      <div class="p-5">
        <div class="flex items-center justify-between mb-6">
          <div class="w-20 h-20 rounded-full p-0.5 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600">
            <img class="w-full h-full rounded-full object-cover border-2 border-white" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&q=80"/>
          </div>
          <div class="flex gap-8 pr-4 text-center">
            <div><p class="font-black text-sm">128</p><p class="text-[10px] text-on-surface-variant">게시물</p></div>
            <div><p class="font-black text-sm">2.4k</p><p class="text-[10px] text-on-surface-variant">팔로워</p></div>
          </div>
        </div>
        <div class="mb-6">
          <h2 class="font-bold text-sm">김나영 | Visual Director</h2>
          <p class="text-xs text-on-surface-variant leading-relaxed">✨ 라이프스타일 큐레이션<br>📍 Seoul, Korea</p>
        </div>
      </div>
      <div class="insta-grid">
        <div><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&q=80"/></div>
        <div><img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=300&q=80"/></div>
        <div><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&q=80"/></div>
      </div>
    </main>

    <nav class="absolute bottom-0 left-0 right-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(182,0,79,0.1)] z-50">
      <a href="index.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">home</span><span class="text-[9px] font-bold">홈</span>
      </a>
      <a href="create.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">add_circle</span><span class="text-[9px] font-bold">만들기</span>
      </a>
      <a href="messages.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">send</span><span class="text-[9px] font-bold">메시지</span>
      </a>
      <a href="profile.html" class="nav-item active flex flex-col items-center gap-1 text-primary">
        <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1">person</span><span class="text-[9px] font-bold">프로필</span>
      </a>
    </nav>
  </div>
</body>
</html>
