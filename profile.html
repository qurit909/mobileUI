<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .hide { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-white overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">
    
    <!-- [페이지] 프로필 메인 -->
    <div id="page-profile" class="flex flex-col h-full w-full absolute inset-0 bg-white z-10">
      <header class="shrink-0 bg-white px-5 py-4 border-b border-rose-100 flex justify-between items-center">
        <div class="w-8"></div> <!-- 정렬용 공백 -->
        <h1 id="display-username-top" class="font-bold text-zinc-800 tracking-tight text-lg">travel_kimtaewoo</h1>
        <button onclick="toggleSettings()" class="w-8 h-8 flex items-center justify-end text-zinc-800 active:scale-90 transition-transform">
          <span class="material-symbols-outlined text-[24px]">menu</span>
        </button>
      </header>
      
      <main class="flex-1 overflow-y-auto no-scrollbar pb-24">
        <div class="px-5 py-6">
          <div class="flex items-center justify-between mb-6">
            <div class="w-24 h-24 rounded-full border-2 border-rose-100 p-1 shrink-0 relative group">
              <img id="display-profile-img" class="w-full h-full rounded-full object-cover" src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop"/>
            </div>
            <div class="flex flex-1 justify-around px-2">
              <div class="flex flex-col items-center cursor-default"><span id="post-count" class="font-extrabold text-zinc-800 text-xl">4</span><span class="text-[12px] font-medium text-zinc-400">게시물</span></div>
              <div onclick="openSubLayer('팔로워')" class="flex flex-col items-center cursor-pointer active:opacity-60 transition-opacity"><span class="font-extrabold text-zinc-800 text-xl">512</span><span class="text-[12px] font-medium text-zinc-400">팔로워</span></div>
              <div onclick="openSubLayer('팔로잉')" class="flex flex-col items-center cursor-pointer active:opacity-60 transition-opacity"><span class="font-extrabold text-zinc-800 text-xl">385</span><span class="text-[12px] font-medium text-zinc-400">팔로잉</span></div>
            </div>
          </div>
          <div class="mb-5">
            <h2 id="display-name" class="font-bold text-zinc-800 text-base">김태우</h2>
            <p id="display-category" class="text-xs text-[#b6004f] font-semibold mb-1">여행 작가</p>
            <p id="display-bio" class="text-sm text-zinc-600 leading-relaxed">세계/전국 각지의 아름다움을 알려드립니다</p>
          </div>
          
          <div class="flex gap-2">
            <button onclick="openEditProfile()" class="flex-1 py-2 bg-zinc-100 rounded-lg text-sm font-bold text-zinc-800 active:scale-[0.98] transition-transform">프로필 편집</button>
          </div>
        </div>
        <div id="post-grid" class="grid grid-cols-3 gap-0.5 border-t border-rose-50"></div>
      </main>

      <!-- [내비게이션] -->
      <nav class="shrink-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl border-t border-rose-100 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(182,0,79,0.05)]">
        <div onclick="location.href='index.html'" class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer">
          <span class="material-symbols-outlined text-[24px]">home</span>
          <span class="text-[9px] font-bold">홈</span>
        </div>
        <div onclick="location.href='create.html'" class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer">
          <span class="material-symbols-outlined text-[24px]">add_circle</span>
          <span class="text-[9px] font-bold">만들기</span>
        </div>
        <div onclick="location.href='message.html'" class="nav-item flex flex-col items-center gap-1 text-zinc-400 cursor-pointer group">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="stroke-zinc-400 group-hover:stroke-zinc-600 transition-colors">
            <path d="M22 12L3 20L6 12L3 4L22 12Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 12H13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="text-[9px] font-bold">메시지</span>
        </div>
        <div class="nav-item active flex flex-col items-center gap-1 text-[#b6004f] cursor-pointer">
          <span class="material-symbols-outlined text-[24px]">person</span>
          <span class="text-[9px] font-bold">프로필</span>
        </div>
      </nav>
    </div>

    <!-- [레이어] 설정 메뉴 -->
    <div id="layer-settings" class="absolute inset-0 bg-white z-[70] hide flex flex-col slide-in-right">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4">
            <button onclick="closeLayer('layer-settings')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
            <h1 class="font-bold text-zinc-800 text-sm">설정 및 개인정보</h1>
        </header>
        <main class="flex-1 overflow-y-auto">
            <div class="p-4 space-y-6">
                <div>
                    <h3 class="text-[11px] font-bold text-zinc-400 uppercase ml-1 mb-2">계정 설정</h3>
                    <div class="bg-zinc-50 rounded-2xl divide-y divide-zinc-200/50">
                        <button onclick="openSubLayer('개인정보 보호')" class="w-full p-4 flex justify-between items-center active:bg-zinc-100 transition-colors rounded-t-2xl">
                            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-zinc-600">lock</span><span class="text-sm text-zinc-700">개인정보 보호</span></div>
                            <span class="material-symbols-outlined text-zinc-400">chevron_right</span>
                        </button>
                        <button onclick="openSubLayer('알림 설정')" class="w-full p-4 flex justify-between items-center active:bg-zinc-100 transition-colors rounded-b-2xl">
                            <div class="flex items-center gap-3"><span class="material-symbols-outlined text-zinc-600">notifications</span><span class="text-sm text-zinc-700">알림 설정</span></div>
                            <span class="material-symbols-outlined text-zinc-400">chevron_right</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- [레이어] 게시물 상세 -->
    <div id="layer-post-detail" class="absolute inset-0 bg-white z-[90] hide flex flex-col slide-in-right">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4 bg-white relative">
            <button onclick="closeLayer('layer-post-detail')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
            <h1 class="font-bold text-zinc-800 text-sm">게시물</h1>
            <div class="flex-1 flex justify-end">
                <button onclick="togglePostMenu()" class="p-1.5 text-zinc-800 active:scale-90 transition-transform">
                    <span class="material-symbols-outlined text-[24px]">more_horiz</span>
                </button>
            </div>
            
            <!-- 게시물 더보기 메뉴 -->
            <div id="post-menu-popover" class="absolute top-14 right-4 w-32 bg-white shadow-xl rounded-2xl border border-zinc-100 py-1 hide z-[100] fade-in">
                <button onclick="actionPost('수정')" class="w-full px-4 py-2.5 text-left text-sm text-zinc-700 flex items-center gap-2 active:bg-zinc-50">
                    <span class="material-symbols-outlined text-[18px]">edit</span>수정
                </button>
                <div class="h-[1px] bg-zinc-100 mx-2"></div>
                <button onclick="actionPost('삭제')" class="w-full px-4 py-2.5 text-left text-sm text-rose-500 flex items-center gap-2 active:bg-zinc-50 font-medium">
                    <span class="material-symbols-outlined text-[18px]">delete</span>삭제
                </button>
            </div>
        </header>
        <main id="post-detail-content" class="flex-1 overflow-y-auto no-scrollbar" onclick="closePostMenu()"></main>
        
        <!-- 댓글 입력창 -->
        <div id="comment-input-area" class="shrink-0 border-t border-zinc-100 bg-white px-4 py-3 flex items-center gap-3">
            <img class="w-8 h-8 rounded-full border border-zinc-100" id="comment-my-profile" src=""/>
            <div class="flex-1 relative">
                <input id="comment-input" type="text" placeholder="댓글 달기..." class="w-full bg-zinc-50 border-none rounded-full px-4 py-2 text-sm focus:ring-1 focus:ring-rose-200 pr-12"/>
                <button onclick="submitComment()" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#b6004f] font-bold text-sm opacity-50 hover:opacity-100 transition-opacity">게시</button>
            </div>
        </div>
    </div>

    <!-- [서브 레이어] 상세 내용 -->
    <div id="layer-sub-detail" class="absolute inset-0 bg-white z-[100] hide flex flex-col slide-in-right">
        <header class="shrink-0 px-5 py-4 border-b border-rose-100 flex items-center gap-4 bg-white">
            <button onclick="closeLayer('layer-sub-detail')" class="text-zinc-800"><span class="material-symbols-outlined">arrow_back</span></button>
            <h1 id="sub-title" class="font-bold text-zinc-800 text-sm">상세</h1>
            <div class="flex-1 text-right">
                <button id="save-btn" class="hide text-[#b6004f] font-bold text-sm" onclick="saveProfile()">완료</button>
            </div>
        </header>
        <main id="sub-content" class="flex-1 overflow-y-auto p-5 text-sm text-zinc-600 leading-relaxed no-scrollbar"></main>
    </div>

    <!-- [사이드 바] -->
    <div id="side-settings" class="absolute inset-0 bg-black/30 z-50 hide fade-in flex justify-end" onclick="toggleSettings()">
      <div class="w-3/4 h-full bg-white slide-in-right p-6" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-extrabold text-zinc-800 text-xl">설정 및 활동</h2>
            <button onclick="toggleSettings()" class="material-symbols-outlined text-zinc-400">close</button>
        </div>
        <div class="space-y-2">
          <button onclick="openLayer('layer-settings')" class="w-full flex items-center justify-between p-4 hover:bg-zinc-50 rounded-2xl group transition-all">
            <div class="flex items-center gap-4"><span class="material-symbols-outlined text-zinc-700 text-[20px]">settings</span><span class="text-sm font-semibold">설정 및 개인정보</span></div>
            <span class="material-symbols-outlined text-zinc-300 group-hover:translate-x-1 transition-transform">chevron_right</span>
          </button>
          <div class="pt-4 mt-4 border-t border-zinc-100">
            <button onclick="openSubLayer('정책 안내')" class="w-full flex items-center justify-between p-4 bg-rose-50/50 hover:bg-rose-50 rounded-2xl group transition-all">
              <div class="flex items-center gap-4 text-rose-600"><span class="material-symbols-outlined text-[20px]">verified_user</span><span class="text-sm font-bold">정책 안내</span></div>
              <span class="material-symbols-outlined text-rose-300 group-hover:translate-x-1 transition-transform">chevron_right</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- [토스트 메시지] -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-5 py-2.5 rounded-full text-xs font-bold hide z-[200] fade-in">메시지</div>

  </div>

  <script>
    let userData = {
        name: "김태우",
        username: "travel_kimtaewoo",
        category: "여행 작가",
        bio: "세계/전국 각지의 아름다움을 알려드립니다",
        profileImg: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=200&auto=format&fit=crop"
    };

    let postsData = [
      { id: 1, images: ["https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80"], likes: 1204, content: "여름의 끝자락에서 만난 드넓은 초원입니다.", tags: "#여행 #풍경", comments: [{id: 101, user: "nature_lover", text: "와 진짜 평화로워 보여요!", replies: []}, {id: 102, user: "hiker_pro", text: "여기 정확한 위치가 어디인가요?", replies: []}] },
      { id: 2, images: ["https://images.unsplash.com/photo-1493246507139-91e8bef99c02?q=80"], likes: 852, content: "웅장한 산맥 아래 흐르는 고요한 호수.", tags: "#호수뷰 #캠핑", comments: [{id: 201, user: "camper_boy", text: "밤에 별 잘 보일 것 같아요!", replies: []}] },
      { id: 3, images: ["https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80"], likes: 2430, content: "구름을 뚫고 솟아오른 설산.", tags: "#만년설 #알프스", comments: [{id: 301, user: "snow_queen", text: "사진 퀄리티 대박입니다...", replies: []}, {id: 302, user: "traveler_z", text: "인생 샷이네요", replies: []}] },
      { id: 4, images: ["https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80"], likes: 1540, content: "도심 속 힐링 스팟을 찾았습니다.", tags: "#도심숲 #산책", comments: [{id: 401, user: "city_walker", text: "서울 근교인가요?", replies: []}] }
    ];

    let currentPostId = null;
    let replyTargetId = null; // 대댓글 대상 (comment.id)
    let editTargetId = null;  // 수정 대상 ({id, isReply, parentId})

    function initGrid() {
      const grid = document.getElementById('post-grid');
      grid.innerHTML = postsData.map((p, i) => `
        <div onclick="openPost(${p.id})" class="aspect-square bg-zinc-100 overflow-hidden cursor-pointer active:opacity-80 transition-opacity">
          <img class="w-full h-full object-cover" src="${p.images[0]}" alt="Post Image"/>
        </div>
      `).join('');
      document.getElementById('post-count').innerText = postsData.length;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.remove('hide');
        setTimeout(() => toast.classList.add('hide'), 2000);
    }

    function actionPost(type) {
        closePostMenu();
        showToast(`게시물을 ${type}할 수 있는 권한이 없습니다.`);
    }

    function togglePostMenu() {
        document.getElementById('post-menu-popover').classList.toggle('hide');
    }

    function closePostMenu() {
        const menu = document.getElementById('post-menu-popover');
        if(menu) menu.classList.add('hide');
    }

    function openPost(id) {
        currentPostId = id;
        renderPostDetail();
        document.getElementById('comment-my-profile').src = userData.profileImg;
        document.getElementById('layer-post-detail').classList.remove('hide');
        resetCommentInput();
    }

    function renderPostDetail() {
        const post = postsData.find(p => p.id === currentPostId);
        if(!post) return;

        const detailContent = document.getElementById('post-detail-content');
        
        const commentsHtml = post.comments.map(c => {
            const isMyComment = c.user === userData.username;
            const repliesHtml = (c.replies || []).map(r => {
                const isMyReply = r.user === userData.username;
                return `
                <div class="flex gap-2 mt-2 ml-6 group">
                    <span class="font-bold text-[11px] text-zinc-800 shrink-0">${r.user}</span>
                    <span class="text-[11px] text-zinc-600 flex-1">${r.text}</span>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        ${isMyReply ? `
                            <button onclick="startEditComment(${c.id}, ${r.id})" class="text-[10px] text-zinc-400">수정</button>
                            <button onclick="deleteComment(${c.id}, ${r.id})" class="text-[10px] text-rose-400">삭제</button>
                        ` : ''}
                    </div>
                </div>`;
            }).join('');

            return `
            <div class="mb-4 group">
                <div class="flex gap-2 items-start">
                    <span class="font-bold text-xs text-zinc-800 shrink-0">${c.user}</span>
                    <span class="text-xs text-zinc-600 flex-1 leading-tight">${c.text}</span>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="startReply(${c.id}, '${c.user}')" class="text-[10px] text-zinc-400">답글</button>
                        ${isMyComment ? `
                            <button onclick="startEditComment(${c.id})" class="text-[10px] text-zinc-400">수정</button>
                            <button onclick="deleteComment(${c.id})" class="text-[10px] text-rose-400">삭제</button>
                        ` : ''}
                    </div>
                </div>
                ${repliesHtml}
            </div>
            `;
        }).join('');

        detailContent.innerHTML = `
            <div class="flex items-center p-3 gap-3">
                <img class="w-8 h-8 rounded-full" src="${userData.profileImg}"/>
                <span class="font-bold text-sm text-zinc-800">${userData.username}</span>
            </div>
            <img class="w-full aspect-square object-cover" src="${post.images[0]}"/>
            <div class="p-4 pb-10">
                <div class="flex gap-4 mb-2">
                    <span class="material-symbols-outlined text-rose-500" style="font-variation-settings: 'FILL' 1;">favorite</span>
                    <span class="material-symbols-outlined text-zinc-600">chat_bubble</span>
                </div>
                <p class="font-bold text-sm mb-1">좋아요 ${post.likes.toLocaleString()}개</p>
                <div class="mb-4">
                    <p class="text-sm text-zinc-800"><span class="font-bold mr-2">${userData.username}</span>${post.content}</p>
                    <p class="text-sm text-blue-600 mt-1">${post.tags}</p>
                </div>
                <div class="border-t border-zinc-100 pt-3">
                    <p class="text-[11px] font-bold text-zinc-400 mb-3">댓글 ${post.comments.length}개</p>
                    ${commentsHtml}
                </div>
            </div>
        `;
    }

    function startReply(commentId, username) {
        replyTargetId = commentId;
        editTargetId = null;
        const input = document.getElementById('comment-input');
        input.placeholder = `@${username}님에게 답글 남기기...`;
        input.focus();
    }

    function startEditComment(commentId, replyId = null) {
        const post = postsData.find(p => p.id === currentPostId);
        let targetText = "";
        
        if (replyId) {
            const parent = post.comments.find(c => c.id === commentId);
            const reply = parent.replies.find(r => r.id === replyId);
            targetText = reply.text;
            editTargetId = { id: replyId, isReply: true, parentId: commentId };
        } else {
            const comment = post.comments.find(c => c.id === commentId);
            targetText = comment.text;
            editTargetId = { id: commentId, isReply: false };
        }

        replyTargetId = null;
        const input = document.getElementById('comment-input');
        input.value = targetText;
        input.placeholder = "댓글 수정 중...";
        input.focus();
    }

    function deleteComment(commentId, replyId = null) {
        const post = postsData.find(p => p.id === currentPostId);
        if (replyId) {
            const parent = post.comments.find(c => c.id === commentId);
            parent.replies = parent.replies.filter(r => r.id !== replyId);
        } else {
            post.comments = post.comments.filter(c => c.id !== commentId);
        }
        renderPostDetail();
        showToast("댓글이 삭제되었습니다.");
    }

    function submitComment() {
        const input = document.getElementById('comment-input');
        const text = input.value.trim();
        if (!text) return;

        const post = postsData.find(p => p.id === currentPostId);

        if (editTargetId) {
            // 수정 모드
            if (editTargetId.isReply) {
                const parent = post.comments.find(c => c.id === editTargetId.parentId);
                const reply = parent.replies.find(r => r.id === editTargetId.id);
                reply.text = text;
            } else {
                const comment = post.comments.find(c => c.id === editTargetId.id);
                comment.text = text;
            }
            showToast("댓글이 수정되었습니다.");
        } else if (replyTargetId) {
            // 답글 모드
            const parent = post.comments.find(c => c.id === replyTargetId);
            parent.replies.push({
                id: Date.now(),
                user: userData.username,
                text: text
            });
        } else {
            // 새 댓글 모드
            post.comments.push({
                id: Date.now(),
                user: userData.username,
                text: text,
                replies: []
            });
        }

        resetCommentInput();
        renderPostDetail();
    }

    function resetCommentInput() {
        const input = document.getElementById('comment-input');
        input.value = "";
        input.placeholder = "댓글 달기...";
        replyTargetId = null;
        editTargetId = null;
    }

    function toggleSettings() {
      const el = document.getElementById('side-settings');
      el.classList.toggle('hide');
    }

    function openLayer(id) {
      if(!document.getElementById('side-settings').classList.contains('hide')) toggleSettings();
      document.getElementById(id).classList.remove('hide');
    }

    function closeLayer(id) {
      document.getElementById(id).classList.add('hide');
      document.getElementById('save-btn').classList.add('hide');
      if (id === 'layer-post-detail') {
          closePostMenu();
          currentPostId = null;
      }
    }

    function openSubLayer(title) {
        if(!document.getElementById('side-settings').classList.contains('hide')) toggleSettings();
        document.getElementById('sub-title').innerText = title;
        const content = document.getElementById('sub-content');
        const saveBtn = document.getElementById('save-btn');
        
        if(title === '정책 안내') {
            saveBtn.classList.add('hide');
            content.innerHTML = `
                <div class="space-y-6 fade-in pt-4">
                    <section>
                        <h4 class="text-sm font-bold text-zinc-800 mb-2 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-rose-400 rounded-full"></span>수수료 정책
                        </h4>
                        <p class="text-xs text-zinc-500 leading-relaxed pl-3.5">
                            본 서비스의 안전한 운영을 위해 <span class="text-rose-600 font-bold">모든 거래 금액의 1.7%</span>가 시스템 이용료(수수료)로 청구됩니다. 이 수수료는 결제망 유지 및 분쟁 해결 지원에 사용됩니다.
                        </p>
                    </section>

                    <section>
                        <h4 class="text-sm font-bold text-zinc-800 mb-2 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-rose-400 rounded-full"></span>법적 책임 고지
                        </h4>
                        <div class="bg-zinc-50 p-4 rounded-xl space-y-3">
                            <div>
                                <p class="text-[11px] font-extrabold text-zinc-700 mb-1">1. 정보의 책임</p>
                                <p class="text-[10px] text-zinc-400 leading-normal">게시된 콘텐츠는 작가 개인의 소유이며, 플랫폼은 그 내용을 보증하거나 대리하지 않습니다.</p>
                            </div>
                            <div>
                                <p class="text-[11px] font-extrabold text-zinc-700 mb-1">2. 분쟁 및 책임</p>
                                <p class="text-[10px] text-zinc-400 leading-normal">사용자 간의 직접 거래로 발생하는 문제에 대해 플랫폼은 법적 책임을 지지 않으며, 당사자 간 해결을 원칙으로 합니다.</p>
                            </div>
                            <div>
                                <p class="text-[11px] font-extrabold text-zinc-700 mb-1">3. 저작권 위반</p>
                                <p class="text-[10px] text-zinc-400 leading-normal">타인의 저작물을 도용하거나 허위 정보를 게시할 경우 예고 없이 삭제될 수 있으며 법적 처벌의 대상이 될 수 있습니다.</p>
                            </div>
                        </div>
                    </section>
                </div>`;
        } else if(title === '개인정보 보호') {
            saveBtn.classList.add('hide');
            content.innerHTML = `
                <div class="space-y-1 bg-zinc-50 rounded-2xl overflow-hidden divide-y divide-zinc-100">
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">비공개 계정</span><div class="w-10 h-5 bg-zinc-200 rounded-full relative"><div class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-all"></div></div></div>
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">차단된 계정</span><span class="material-symbols-outlined text-zinc-300">chevron_right</span></div>
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">활동 상태</span><span class="material-symbols-outlined text-zinc-300">chevron_right</span></div>
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">언급 및 태그</span><span class="material-symbols-outlined text-zinc-300">chevron_right</span></div>
                </div>`;
        } else if(title === '알림 설정') {
            saveBtn.classList.add('hide');
            content.innerHTML = `
                <div class="space-y-1 bg-zinc-50 rounded-2xl overflow-hidden divide-y divide-zinc-100">
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">모두 일시 중단</span><div class="w-10 h-5 bg-zinc-200 rounded-full relative"><div class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-all"></div></div></div>
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">게시물 및 스토리</span><span class="material-symbols-outlined text-zinc-300">chevron_right</span></div>
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">팔로잉 및 팔로워</span><span class="material-symbols-outlined text-zinc-300">chevron_right</span></div>
                    <div class="p-4 flex justify-between items-center bg-white"><span class="text-sm">메시지 알림</span><span class="material-symbols-outlined text-zinc-300">chevron_right</span></div>
                </div>`;
        } else if(title === '프로필 편집') {
            saveBtn.classList.remove('hide');
            content.innerHTML = `
                <div class="flex flex-col items-center mb-8 fade-in">
                    <div class="relative w-20 h-20 mb-3">
                        <img id="edit-preview-img" class="w-full h-full rounded-full object-cover border border-zinc-100 shadow-sm" src="${userData.profileImg}"/>
                        <label class="absolute bottom-0 right-0 bg-white shadow-md rounded-full p-1.5 cursor-pointer border border-zinc-100 active:scale-90 transition-transform">
                            <span class="material-symbols-outlined text-[16px] text-blue-500">photo_camera</span>
                            <input type="file" class="hidden" onchange="handleImgChange(this)"/>
                        </label>
                    </div>
                    <button class="text-blue-500 font-bold text-xs">프로필 사진 변경</button>
                </div>
                <div class="space-y-5 fade-in">
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-zinc-400 ml-1">이름</label>
                        <input id="edit-name" type="text" class="w-full bg-zinc-50 border-none rounded-xl text-sm p-3 focus:ring-1 focus:ring-rose-200" value="${userData.name}"/>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-zinc-400 ml-1">사용자 이름</label>
                        <input id="edit-username" type="text" class="w-full bg-zinc-50 border-none rounded-xl text-sm p-3 focus:ring-1 focus:ring-rose-200" value="${userData.username}"/>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-zinc-400 ml-1">카테고리</label>
                        <input id="edit-category" type="text" class="w-full bg-zinc-50 border-none rounded-xl text-sm p-3 focus:ring-1 focus:ring-rose-200" value="${userData.category}"/>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-zinc-400 ml-1">소개</label>
                        <textarea id="edit-bio" rows="3" class="w-full bg-zinc-50 border-none rounded-xl text-sm p-3 focus:ring-1 focus:ring-rose-200 resize-none">${userData.bio}</textarea>
                    </div>
                </div>
            `;
        } else {
            saveBtn.classList.add('hide');
            content.innerHTML = `<p class="text-zinc-400 text-xs italic text-center py-10">내용을 준비 중입니다.</p>`;
        }
        document.getElementById('layer-sub-detail').classList.remove('hide');
    }

    function handleImgChange(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('edit-preview-img').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveProfile() {
        userData.name = document.getElementById('edit-name').value;
        userData.username = document.getElementById('edit-username').value;
        userData.category = document.getElementById('edit-category').value;
        userData.bio = document.getElementById('edit-bio').value;
        userData.profileImg = document.getElementById('edit-preview-img').src;

        document.getElementById('display-name').innerText = userData.name;
        document.getElementById('display-username-top').innerText = userData.username;
        document.getElementById('display-category').innerText = userData.category;
        document.getElementById('display-bio').innerText = userData.bio;
        document.getElementById('display-profile-img').src = userData.profileImg;

        closeLayer('layer-sub-detail');
        showToast("프로필이 업데이트되었습니다.");
    }

    function openEditProfile() {
        openSubLayer('프로필 편집');
    }

    window.onload = initGrid;
  </script>
</body>
</html>
