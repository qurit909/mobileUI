  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#b6004f",
            "on-primary": "#ffffff",
            "surface": "#fff4f6",
            "on-surface": "#4a2135",
            "on-surface-variant": "#7d4d63",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#ffecf2",
            "surface-container-high": "#ffd8e7",
            "surface-container-highest": "#ffd0e3",

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .page { display: none; flex-direction: column; height: 100%; position: relative; }
    .page.active { display: flex; }
    .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .insta-grid div { aspect-ratio: 1 / 1; overflow: hidden; background-color: #eee; }
    .insta-grid img { width: 100%; height: 100%; object-fit: cover; }
    .mode-btn.active { background-color: #b6004f; color: white; }
    
    #review-modal, #portfolio-modal, #chat-page { display: none; }
    #review-modal.active, #portfolio-modal.active, #chat-page.active { display: flex; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* 채팅방 메뉴 드롭다운 */
    #chat-menu-dropdown { display: none; }
    #chat-menu-dropdown.active { display: block; }

<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-surface overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">

    function toggleFeedMode(mode) {
      document.querySelectorAll('.mode-btn').forEach(b => {
        b.classList.remove('active', 'bg-primary', 'text-white');
        b.classList.add('text-on-surface-variant');
      });
      const activeBtn = document.getElementById('btn-' + mode);
      activeBtn.classList.add('active', 'bg-primary', 'text-white');
      activeBtn.classList.remove('text-on-surface-variant');
      renderFeed(mode);
    }

    function renderFeed(filter) {
      const container = document.getElementById('feed-container');
      const filtered = allProfiles.filter(p => p.type === filter);
      container.innerHTML = filtered.map(p => `
        <article class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-rose-50">
          <img class="w-full h-80 object-cover" src="${p.img}"/>
          <div class="p-6">
            <div class="flex justify-between items-center mb-2">
              <div>
                <h2 class="text-xl font-extrabold text-on-surface">${p.name}</h2>
                <p class="text-xs text-on-surface-variant font-medium">${p.handle}</p>
              </div>
              <div class="flex items-center gap-1 bg-rose-50 px-2 py-1 rounded-lg">
                <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1">star</span>
                <span class="text-xs font-bold text-primary">${p.rating}</span>
                <span class="text-[10px] text-on-surface-variant">(${p.reviews})</span>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4 mt-4">
              ${p.type === 'personal' ? `
                <div class="bg-surface-container-low p-3 rounded-2xl text-center">
                  <span class="block text-[8px] font-bold text-on-surface-variant uppercase mb-1">팔로워 수</span>
                  <span class="text-md font-black text-on-surface">${p.followers}</span>
                </div>
                <div class="bg-surface-container-low p-3 rounded-2xl text-center">
                  <span class="block text-[8px] font-bold text-on-surface-variant uppercase mb-1">활동지수</span>
                  <span class="text-md font-black text-primary">${p.activity}</span>
                </div>
              ` : `
                <div class="bg-surface-container-low p-3 rounded-2xl text-center">
                  <span class="block text-[8px] font-bold text-on-surface-variant uppercase mb-1">카테고리</span>
                  <span class="text-md font-black text-on-surface">${p.category}</span>
                </div>
                <div class="bg-surface-container-low p-3 rounded-2xl text-center">
                  <span class="block text-[8px] font-bold text-on-surface-variant uppercase mb-1">응답 속도</span>
                  <span class="text-md font-black text-primary">${p.response}</span>
                </div>
              `}
            </div>
            <button onclick="openPersonaDetail(${p.id})" class="w-full py-3.5 bg-primary text-white text-sm font-bold rounded-xl active:scale-95 transition-transform shadow-md">상세 정보 보기</button>
          </div>
        </article>
      `).join('');
    }

    function openPersonaDetail(id) {
      currentDetailProfileId = id;
      const p = allProfiles.find(item => item.id === id);
      if (!p) return;
      const detailContent = document.getElementById('detail-content');
      detailContent.innerHTML = `
        <div class="px-6 py-8">
          <div class="flex items-center gap-5 mb-10">
            <img class="w-24 h-24 rounded-3xl object-cover shadow-lg border-2 border-primary/10" src="${p.img}"/>
            <div>
              <h2 class="text-2xl font-black text-on-surface">${p.name}</h2>
              <p class="text-sm font-bold text-primary mb-1">${p.handle}</p>
              <div class="flex items-center gap-1.5">
                <div class="flex gap-0.5">
                  ${new Array(5).fill(0).map((_, i) => `<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' ${i < Math.floor(p.rating) ? 1 : 0}">star</span>`).join('')}
                </div>
                <span class="text-[10px] font-bold text-on-surface-variant mt-0.5">(${p.reviews})</span>
              </div>
            </div>
          </div>
          <div class="space-y-6">
            <div class="bg-surface-container-low p-5 rounded-[2rem] border border-rose-100">
              <h3 class="text-[10px] font-black text-primary uppercase tracking-widest mb-3 flex items-center gap-2"><span class="material-symbols-outlined text-sm">badge</span> ${p.type === 'personal' ? '인적 사항' : '기업 개요'}</h3>
              <p class="text-sm font-bold text-on-surface leading-relaxed">${p.persona.age}</p>
              <p class="text-xs text-on-surface-variant mt-2">${p.persona.personality}</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] border border-rose-100 shadow-sm">
              <h3 class="text-[10px] font-black text-primary uppercase tracking-widest mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-sm">favorite</span> ${p.type === 'personal' ? '관심사 및 취향' : '핵심 가치 및 분야'}</h3>
              <div class="flex flex-wrap gap-2">${p.persona.interests.map(tag => `<span class="px-3 py-1.5 bg-rose-50 text-primary text-[10px] font-bold rounded-full">#${tag}</span>`).join('')}</div>
            </div>
            <div class="bg-white p-5 rounded-[2rem] border border-rose-100 shadow-sm">
              <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-primary uppercase tracking-widest flex items-center gap-2"><span class="material-symbols-outlined text-sm">chat_bubble</span> 리뷰 요약</h3>
                <button onclick="openReviewModal()" class="px-3 py-1 bg-rose-50 rounded-full text-[9px] font-bold text-primary active:scale-90 transition-all">자세히 보기</button>
              </div>
              <p class="text-xs text-on-surface leading-relaxed font-medium italic">"${p.reviewSummary}"</p>
            </div>
            
            <div class="flex gap-3 pt-2">
              <button onclick="openPortfolioModal()" class="flex-1 bg-zinc-900 text-white py-4 rounded-2xl text-[11px] font-bold flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg">
                <span class="material-symbols-outlined text-sm">grid_view</span> 포트폴리오 보기
              </button>
              <button onclick="openChat()" class="flex-1 bg-primary text-white py-4 rounded-2xl text-[11px] font-bold flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg">
                <span class="material-symbols-outlined text-sm">send</span> 메시지 보내기
              </button>
            </div>
          </div>
        </div>`;
      document.getElementById('page-detail').classList.add('active');
    }

    function openPortfolioModal() {
      const p = allProfiles.find(item => item.id === currentDetailProfileId);
      if (!p) return;
      const grid = document.getElementById('portfolio-grid');
      let imagesHtml = '';
      const displayPhotos = [...p.portfolio, ...p.portfolio, ...p.portfolio].slice(0, 12);
      imagesHtml = displayPhotos.map(url => `<div><img src="${url}" loading="lazy"/></div>`).join('');
      grid.innerHTML = imagesHtml;
      document.getElementById('portfolio-modal').classList.add('active');
    }

    function closePortfolioModal() {
      document.getElementById('portfolio-modal').classList.remove('active');
    }

    function toggleChatMenu() {
      document.getElementById('chat-menu-dropdown').classList.toggle('active');
    }

    function openChat() {
      const p = allProfiles.find(item => item.id === currentDetailProfileId);
      if (!p) return;
      document.getElementById('chat-target-img').src = p.img;
      document.getElementById('chat-target-name').innerText = p.name;
      
      // 채팅방 초기화 (첫 시작처럼)
      const chatContainer = document.getElementById('chat-messages');
      chatContainer.innerHTML = `
        <div class="flex justify-center">
            <span class="bg-rose-100/50 text-rose-400 text-[10px] px-3 py-1 rounded-full font-bold">대화가 시작되었습니다</span>
        </div>
        <div class="flex flex-col gap-2 max-w-[80%]">
            <div class="bg-white p-3 rounded-2xl rounded-tl-none text-xs font-medium text-zinc-700 shadow-sm border border-rose-50">
                안녕하세요! ${p.name}님, 프로필 보고 연락드렸습니다. 협업 관련해서 문의 드려도 될까요?
            </div>
            <span class="text-[9px] text-zinc-400 font-bold ml-1">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
        </div>
      `;
      
      document.getElementById('chat-menu-dropdown').classList.remove('active');
      document.getElementById('chat-page').classList.add('active');
    }

    function closeChat() {
      document.getElementById('chat-page').classList.remove('active');
    }

    function generateMockReviews(count, baseRating) {
      const names = ["이지현", "마크", "사라", "최민석", "김아름", "박건우"];
      const comments = ["정말 만족스러운 협업이었습니다!", "결과물 퀄리티가 기대 이상이에요.", "소통이 원활하고 친절하셨어요."];
      const reviews = [];
      for(let i=0; i<count; i++) {
        reviews.push({
          id: i,
          user: names[Math.floor(Math.random() * names.length)],
          rating: (Math.random() * 2 + (parseFloat(baseRating) - 1)).toFixed(1),
          date: new Date(Date.now() - Math.floor(Math.random() * 1000000000)).toLocaleDateString(),
          text: comments[Math.floor(Math.random() * comments.length)]
        });
      }
      return reviews;
    }

    function openReviewModal() {
      const p = allProfiles.find(item => item.id === currentDetailProfileId);
      if (!p) return;
      currentReviews = generateMockReviews(Math.min(p.reviews, 15), p.rating);
      document.getElementById('review-total-count').innerText = `총 ${p.reviews}개의 리뷰 중 최근 내역`;
      sortReviews('latest');
      document.getElementById('review-modal').classList.add('active');
    }

    function sortReviews(type) {
      const latestBtn = document.getElementById('sort-latest');
      const ratingBtn = document.getElementById('sort-rating');
      if (type === 'latest') {
        currentReviews.sort((a, b) => new Date(b.date) - new Date(a.date));
        latestBtn.className = "px-4 py-1.5 rounded-full text-[10px] font-bold bg-primary text-white";
        ratingBtn.className = "px-4 py-1.5 rounded-full text-[10px] font-bold bg-rose-50 text-on-surface-variant";
      } else {
        currentReviews.sort((a, b) => b.rating - a.rating);
        ratingBtn.className = "px-4 py-1.5 rounded-full text-[10px] font-bold bg-primary text-white";
        latestBtn.className = "px-4 py-1.5 rounded-full text-[10px] font-bold bg-rose-50 text-on-surface-variant";
      }
      renderReviews();
    }

    function renderReviews() {
      const container = document.getElementById('review-list');
      container.innerHTML = currentReviews.map(r => `
        <div class="bg-surface-container-low/50 p-4 rounded-2xl border border-rose-50">
          <div class="flex justify-between items-start mb-2">
            <div>
              <span class="text-xs font-black text-on-surface">${r.user}</span>
              <div class="flex mt-0.5">
                ${new Array(5).fill(0).map((_, i) => `<span class="material-symbols-outlined text-[10px] text-primary" style="font-variation-settings: 'FILL' ${i < Math.floor(r.rating) ? 1 : 0}">star</span>`).join('')}
              </div>
            </div>
            <span class="text-[9px] font-bold text-on-surface-variant">${r.date}</span>
          </div>
          <p class="text-[11px] text-on-surface leading-normal">${r.text}</p>
        </div>
      `).join('');
    }

    function closeReviewModal() {
      document.getElementById('review-modal').classList.remove('active');
    }

    function closeDetail() {
      document.getElementById('page-detail').classList.remove('active');
    }

    // 전역 클릭 이벤트로 드롭다운 닫기
    window.onclick = function(event) {
        if (!event.target.matches('.material-symbols-outlined')) {
            var dropdowns = document.getElementsByClassName("chat-menu-dropdown");
            const menu = document.getElementById('chat-menu-dropdown');
            if (menu && menu.classList.contains('active') && !event.target.closest('#chat-menu-dropdown') && !event.target.closest('button[onclick="toggleChatMenu()"]')) {
                menu.classList.remove('active');
            }
        }
    }

    renderFeed('personal');
  </script>
</body>
</html>
