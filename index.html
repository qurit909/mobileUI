<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>Editorial - Profile Explorer</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#b6004f",
            "on-primary": "#ffffff",
            "surface": "#fff4f6",
            "on-surface": "#4a2135",
            "on-surface-variant": "#7d4d63",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#ffecf2",
            "surface-container-high": "#ffd8e7",
            "surface-container-highest": "#ffd0e3",
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .page { display: none; flex-direction: column; height: 100%; position: relative; }
    .page.active { display: flex; }
    .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .insta-grid div { aspect-ratio: 1 / 1; overflow: hidden; background-color: #fce7f3; }
    .insta-grid img { width: 100%; height: 100%; object-fit: cover; }
    .mode-btn.active { background-color: #b6004f; color: white; }
    
    #review-modal, #chat-page { display: none; }
    #review-modal.active, #chat-page.active { display: flex; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }

    #chat-menu-dropdown { display: none; }
    #chat-menu-dropdown.active { display: block; }
    
    #attachment-menu { display: none; }
    #attachment-menu.active { display: block; }
  </style>
</head>
<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-surface overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">
    
    <!-- Home Page -->
    <section id="page-home" class="page active">
      <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-rose-100 z-10">
        <div class="flex items-center gap-2">
          <div class="h-8 w-8 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-sm font-black text-[10px]">E</div>
          <h1 class="text-lg font-black tracking-tighter text-zinc-900">Editorial</h1>
        </div>
        <div class="flex items-center gap-1">
          <div class="flex bg-rose-50 p-1 rounded-full mr-1">
            <button onclick="toggleFeedMode('personal')" id="btn-personal" class="mode-btn active px-2.5 py-1 rounded-full text-[9px] font-bold transition-all">개인</button>
            <button onclick="toggleFeedMode('company')" id="btn-company" class="mode-btn px-2.5 py-1 rounded-full text-[9px] font-bold text-on-surface-variant transition-all">기업</button>
          </div>
          <button class="p-2 text-primary"><span class="material-symbols-outlined">search</span></button>
        </div>
      </header>
      <main id="feed-container" class="flex-1 overflow-y-auto p-4 space-y-6 hide-scrollbar pb-24"></main>
    </section>

    <!-- Detail Overlay -->
    <section id="page-detail" class="page bg-white absolute inset-0 z-[60]">
      <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 flex items-center border-b border-rose-100">
        <button onclick="closeDetail()" class="text-primary mr-4"><span class="material-symbols-outlined">arrow_back_ios</span></button>
        <h1 class="font-bold text-primary tracking-tight">상세 프로필</h1>
      </header>
      <main id="detail-content" class="flex-1 overflow-y-auto hide-scrollbar pb-24"></main>
    </section>

    <!-- Review Modal -->
    <section id="review-modal" class="absolute inset-0 bg-black/40 z-[70] items-end justify-center">
      <div class="w-full bg-white rounded-t-[2.5rem] h-[80%] flex flex-col overflow-hidden animate-slide-up">
        <header class="p-6 border-b border-rose-50 flex justify-between items-center">
          <div>
            <h2 class="text-lg font-black text-on-surface">리뷰 상세</h2>
            <p id="review-total-count" class="text-xs text-on-surface-variant font-bold">총 리뷰</p>
          </div>
          <button onclick="closeReviewModal()" class="w-10 h-10 bg-rose-50 rounded-full flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">close</span>
          </button>
        </header>
        <div id="review-list" class="flex-1 overflow-y-auto px-6 space-y-4 py-6 hide-scrollbar text-center text-zinc-400">
            준비 중입니다...
        </div>
      </div>
    </section>

    <!-- Chat Page Overlay -->
    <section id="chat-page" class="page bg-[#fff4f6] absolute inset-0 z-[80]">
      <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 border-b border-rose-100 flex items-center justify-between relative">
        <div class="flex items-center">
          <button onclick="closeChat()" class="text-primary mr-4"><span class="material-symbols-outlined">arrow_back_ios</span></button>
          <div class="flex items-center gap-3">
              <img id="chat-target-img" class="w-8 h-8 rounded-full object-cover" src=""/>
              <h1 id="chat-target-name" class="font-bold text-zinc-800 tracking-tight">대상 이름</h1>
          </div>
        </div>
        <div class="relative">
          <button onclick="toggleChatMenu()" class="p-2 text-primary"><span class="material-symbols-outlined">more_vert</span></button>
          <div id="chat-menu-dropdown" class="absolute right-0 top-12 w-40 bg-white rounded-2xl shadow-xl border border-rose-50 overflow-hidden z-[100]">
              <button class="w-full text-left px-4 py-3 text-xs font-bold text-on-surface hover:bg-rose-50 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">search</span> 대화 검색
              </button>
              <button class="w-full text-left px-4 py-3 text-xs font-bold text-on-surface hover:bg-rose-50 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">grid_view</span> 미디어 모음
              </button>
          </div>
        </div>
      </header>

      <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24 hide-scrollbar"></main>

      <div class="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-rose-100">
        <div id="attachment-menu" class="absolute left-4 bottom-20 w-32 bg-white rounded-2xl shadow-xl border border-rose-50 overflow-hidden z-[100]">
          <label class="w-full text-left px-4 py-3 text-[11px] font-bold text-on-surface hover:bg-rose-50 flex items-center gap-2 cursor-pointer">
            <span class="material-symbols-outlined text-sm">image</span> 사진 보내기
            <input type="file" accept="image/*" class="hidden" onchange="handleFileUpload('image')">
          </label>
          <label class="w-full text-left px-4 py-3 text-[11px] font-bold text-on-surface hover:bg-rose-50 flex items-center gap-2 cursor-pointer">
            <span class="material-symbols-outlined text-sm">description</span> 파일 보내기
            <input type="file" class="hidden" onchange="handleFileUpload('file')">
          </label>
        </div>
        
        <form onsubmit="sendMessage(event)" class="flex items-center gap-2">
            <button type="button" onclick="toggleAttachmentMenu()" class="text-primary p-1"><span class="material-symbols-outlined">add_circle</span></button>
            <div class="flex-1 flex items-center gap-2 bg-rose-50 rounded-full px-4 py-2 border border-rose-100">
                <input id="chat-input" type="text" placeholder="메시지를 입력하세요..." class="flex-1 bg-transparent border-none focus:ring-0 text-xs text-on-surface placeholder-rose-300 font-medium"/>
                <button type="submit" class="text-primary"><span class="material-symbols-outlined">send</span></button>
            </div>
        </form>
      </div>
    </section>

    <!-- Navbar (Buttons updated with requested links and names) -->
    <nav class="absolute bottom-0 left-0 right-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(182,0,79,0.1)] z-50">
      <button onclick="showHome()" id="nav-home" class="nav-item active flex flex-col items-center gap-1 text-primary">
        <span class="material-symbols-outlined text-[24px]">home</span><span class="text-[9px] font-bold">홈</span>
      </button>
      <button onclick="location.href='create.html'" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">add_circle</span><span class="text-[9px] font-bold">추가</span>
      </button>
      <button onclick="location.href='message.html'" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">forum</span><span class="text-[9px] font-bold">메시지</span>
      </button>
      <button onclick="location.href='profile.html'" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined text-[24px]">account_circle</span><span class="text-[9px] font-bold">프로필</span>
      </button>
    </nav>
  </div>

  <script>
    const getRandomReviews = () => Math.floor(Math.random() * 40) + 5;
    
    const allProfiles = [
      { 
        id: 1, type: 'personal', name: "김지수", category: "뷰티 모델", handle: "@jisoo_style", 
        img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=400&h=600&fit=crop", 
        followers: "12.4K", engagement: 82.5, reviews: getRandomReviews(), rating: "4.9", 
        reviewSummary: "매우 전문적이고 결과물이 깔끔해요.", 
        persona: { age: "24세", personality: "에너제틱함", interests: ["클린 뷰티", "건축"], goal: "브랜드 이미지 고급화" }, 
        portfolio: ["https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=400", "https://images.unsplash.com/photo-1529139513402-748473019270?q=80&w=400", "https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=400"] 
      },
      { 
        id: 2, type: 'personal', name: "박소희", category: "패션 디렉터", handle: "@sohee_beauty", 
        img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=400&h=600&fit=crop", 
        followers: "852", engagement: 45.2, reviews: getRandomReviews(), rating: "5.0", 
        reviewSummary: "감각적인 스타일링이 인상적입니다.", 
        persona: { age: "27세", personality: "꼼꼼함", interests: ["스트릿 패션", "브이로그"], goal: "새로운 패션 담론 제시" }, 
        portfolio: ["https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=400", "https://images.unsplash.com/photo-1512496015851-a90fb38ba796?q=80&w=400", "https://images.unsplash.com/photo-1526045478516-99145907023c?q=80&w=400"] 
      },
      { 
        id: 3, type: 'personal', name: "이준호", category: "여행 작가", handle: "@junho_snap", 
        img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=400&h=600&fit=crop", 
        followers: "5.2K", engagement: 31.8, reviews: getRandomReviews(), rating: "4.7", 
        reviewSummary: "사진의 분위기가 독보적입니다.", 
        persona: { age: "29세", personality: "차분함", interests: ["풍경", "카페"], goal: "브랜드 스토리텔링 지원" }, 
        portfolio: ["https://images.unsplash.com/photo-1493130952181-47e36589f64d?q=80&w=400", "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=400", "https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=400"] 
      },
      { 
        id: 4, type: 'personal', name: "한서연", category: "라이프스타일", handle: "@seoyeon_daily", 
        img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&h=600&fit=crop", 
        followers: "24.1K", engagement: 92.3, reviews: getRandomReviews(), rating: "4.8", 
        reviewSummary: "소통이 빠르고 피드백이 정확해요.", 
        persona: { age: "22세", personality: "친근함", interests: ["다꾸", "인테리어"], goal: "편안한 일상의 공유" }, 
        portfolio: ["https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=400", "https://images.unsplash.com/photo-1488161628813-04466f872be2?q=80&w=400", "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?q=80&w=400"] 
      },
      { 
        id: 5, type: 'personal', name: "정민우", category: "운동 전문가", handle: "@minu_health", 
        img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=400&h=600&fit=crop", 
        followers: "9.8K", engagement: 58.7, reviews: getRandomReviews(), rating: "4.5", 
        reviewSummary: "진정성 있는 콘텐츠를 만듭니다.", 
        persona: { age: "31세", personality: "열정적", interests: ["헬스", "식단"], goal: "지속가능한 건강 전달" }, 
        portfolio: ["https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=400", "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?q=80&w=400", "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=400"] 
      },
      { 
        id: 6, type: 'company', name: "아우라 뷰티", category: "코스메틱 브랜드", handle: "@aura_skin_lab", 
        img: "https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=400&h=400&fit=crop", 
        followers: "125K", response: "10분 내", reviews: getRandomReviews(), rating: "4.9", 
        reviewSummary: "명확한 가이드라인을 제공합니다.", 
        persona: { age: "브랜드", personality: "세련됨", interests: ["비건 뷰티"], goal: "글로벌 뷰티 리딩" }, 
        portfolio: ["https://images.unsplash.com/photo-1570172619380-41617b84758e?q=80&w=400", "https://images.unsplash.com/photo-1594122230689-45899d9e6f69?q=80&w=400", "https://images.unsplash.com/photo-1556227834-09f1de7a7582?q=80&w=400"] 
      }
    ];

    let currentDetailProfileId = null;

    function toggleFeedMode(mode) {
      document.querySelectorAll('.mode-btn').forEach(b => {
        b.classList.remove('active', 'bg-primary', 'text-white');
        b.classList.add('text-on-surface-variant');
      });
      const activeBtn = document.getElementById('btn-' + mode);
      activeBtn.classList.add('active', 'bg-primary', 'text-white');
      activeBtn.classList.remove('text-on-surface-variant');
      renderFeed(mode);
    }

    function renderFeed(filter) {
      const container = document.getElementById('feed-container');
      const filtered = allProfiles.filter(p => p.type === filter);
      container.innerHTML = filtered.map(p => {
        const activityScore = p.type === 'personal' ? `${p.engagement}%` : p.response;
        const scoreLabel = p.type === 'personal' ? '활동지수' : '응답속도';

        return `
        <article class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-rose-50">
          <img class="w-full h-80 object-cover" src="${p.img}"/>
          <div class="p-6">
            <div class="flex justify-between items-start mb-4">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <h2 class="text-xl font-extrabold text-on-surface">${p.name}</h2>
                  <span class="bg-rose-100 text-primary text-[10px] px-2 py-0.5 rounded-full font-bold">${p.category}</span>
                </div>
                <p class="text-xs text-on-surface-variant font-medium">${p.handle}</p>
              </div>
              <div class="flex items-center gap-1 bg-rose-50 px-2 py-1 rounded-lg">
                <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1">star</span>
                <span class="text-xs font-bold text-primary">${p.rating}</span>
                <span class="text-[10px] text-on-surface-variant">(${p.reviews})</span>
              </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-5">
              <div class="bg-rose-50/50 p-3 rounded-2xl text-center border border-rose-100/50">
                <p class="text-[9px] font-bold text-on-surface-variant uppercase mb-1">팔로워</p>
                <p class="text-sm font-black text-on-surface">${p.followers}</p>
              </div>
              <div class="bg-rose-50/50 p-3 rounded-2xl text-center border border-rose-100/50">
                <p class="text-[9px] font-bold text-on-surface-variant uppercase mb-1">${scoreLabel}</p>
                <p class="text-sm font-black text-primary">${activityScore}</p>
              </div>
            </div>

            <button onclick="openPersonaDetail(${p.id})" class="w-full py-3.5 bg-primary text-white text-sm font-bold rounded-xl active:scale-95 transition-transform shadow-md">상세 프로필 보기</button>
          </div>
        </article>
      `}).join('');
    }

    function openPersonaDetail(id) {
      currentDetailProfileId = id;
      const p = allProfiles.find(item => item.id === id);
      if (!p) return;
      const detailContent = document.getElementById('detail-content');
      
      detailContent.innerHTML = `
        <div class="pb-10">
          <div class="px-6 py-8">
            <div class="flex items-center gap-5 mb-8">
              <img class="w-20 h-20 rounded-2xl object-cover shadow-md border border-rose-100" src="${p.img}"/>
              <div>
                <div class="flex flex-wrap items-center gap-2 mb-1">
                  <h2 class="text-2xl font-black text-on-surface">${p.name}</h2>
                  <span class="bg-rose-50 text-primary text-[9px] px-2 py-0.5 rounded-md font-bold border border-rose-100">${p.category}</span>
                </div>
                <p class="text-sm font-bold text-primary mb-1">${p.handle}</p>
                <div class="flex items-center gap-1">
                  <span class="material-symbols-outlined text-xs text-primary" style="font-variation-settings: 'FILL' 1">star</span>
                  <span class="text-xs font-bold text-on-surface">${p.rating}</span>
                  <span class="text-[10px] text-zinc-400 font-medium">(${p.reviews}개의 리뷰)</span>
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <div class="bg-surface-container-low p-5 rounded-[1.5rem] border border-rose-100">
                 <h3 class="text-[10px] font-black text-primary uppercase mb-2 flex items-center gap-1">
                   <span class="material-symbols-outlined text-sm">chat_bubble</span> 리뷰 요약
                 </h3>
                 <p class="text-xs text-on-surface italic font-medium leading-relaxed">"${p.reviewSummary}"</p>
                 <button onclick="openReviewModal()" class="mt-3 text-primary text-[10px] font-bold border-b border-primary">전체 리뷰 보기</button>
              </div>
              
              <div class="bg-white p-5 rounded-[1.5rem] border border-rose-50 shadow-sm">
                 <h3 class="text-[10px] font-black text-primary uppercase mb-3 underline decoration-rose-100">크리에이터 정보</h3>
                 <div class="space-y-2">
                   <p class="text-xs text-on-surface"><span class="font-bold text-on-surface-variant">프로필:</span> ${p.persona.age} / ${p.category}</p>
                   <p class="text-xs text-on-surface"><span class="font-bold text-on-surface-variant">성격:</span> ${p.persona.personality}</p>
                   <p class="text-xs text-on-surface"><span class="font-bold text-on-surface-variant">관심사:</span> ${p.persona.interests.join(', ')}</p>
                   <p class="text-xs text-on-surface"><span class="font-bold text-on-surface-variant">활동 목표:</span> ${p.persona.goal}</p>
                 </div>
              </div>
            </div>
          </div>

          <div class="px-6 pb-4">
             <h3 class="text-[10px] font-black text-zinc-400 uppercase mb-4 tracking-widest px-1">Feed Highlights</h3>
             <div class="insta-grid rounded-xl overflow-hidden border border-rose-50 shadow-sm">
                ${p.portfolio.map(url => `<div><img src="${url}" loading="lazy"/></div>`).join('')}
             </div>
          </div>

          <div class="px-6 mt-6">
            <button onclick="openChat()" class="w-full bg-primary text-white py-4 rounded-2xl text-[13px] font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">send</span>
              협업 메시지 보내기
            </button>
          </div>
        </div>`;
      document.getElementById('page-detail').classList.add('active');
    }

    function openReviewModal() {
      const p = allProfiles.find(item => item.id === currentDetailProfileId);
      if (!p) return;
      document.getElementById('review-total-count').innerText = `총 ${p.reviews}개의 리뷰`;
      document.getElementById('review-modal').classList.add('active');
    }

    function closeDetail() { document.getElementById('page-detail').classList.remove('active'); }
    function closeReviewModal() { document.getElementById('review-modal').classList.remove('active'); }
    function showHome() {
        closeDetail();
        closeChat();
    }

    function toggleChatMenu() { document.getElementById('chat-menu-dropdown').classList.toggle('active'); }
    function toggleAttachmentMenu() { document.getElementById('attachment-menu').classList.toggle('active'); }
    function closeChat() { document.getElementById('chat-page').classList.remove('active'); }
    
    function openChat() {
      const p = allProfiles.find(item => item.id === currentDetailProfileId);
      if (!p) return;
      document.getElementById('chat-target-img').src = p.img;
      document.getElementById('chat-target-name').innerText = p.name;
      document.getElementById('chat-messages').innerHTML = `
        <div class="flex justify-center">
            <span class="bg-rose-100/50 text-rose-400 text-[10px] px-3 py-1 rounded-full font-bold">대화가 시작되었습니다</span>
        </div>`;
      document.getElementById('chat-page').classList.add('active');
      document.getElementById('chat-menu-dropdown').classList.remove('active');
      document.getElementById('attachment-menu').classList.remove('active');
    }

    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;
        appendMessage(text, 'me');
        input.value = '';
    }

    function appendMessage(text, type, contentType = 'text') {
        const container = document.getElementById('chat-messages');
        const msg = document.createElement('div');
        const isMe = type === 'me';
        const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        msg.className = `flex flex-col gap-1 max-w-[80%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`;
        
        let innerHTML = "";
        if (contentType === 'text') {
            innerHTML = `
                <div class="${isMe ? 'bg-primary text-white' : 'bg-white text-on-surface'} p-3 rounded-2xl ${isMe ? 'rounded-tr-none' : 'rounded-tl-none'} text-xs font-medium shadow-sm border ${isMe ? 'border-primary' : 'border-rose-100'}">
                    ${text}
                </div>`;
        } else if (contentType === 'image') {
            innerHTML = `
                <div class="bg-primary/10 p-2 rounded-2xl ${isMe ? 'rounded-tr-none' : 'rounded-tl-none'} border border-primary/20">
                    <div class="w-32 h-32 bg-rose-100 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-3xl">image</span>
                    </div>
                    <p class="text-[10px] font-bold text-primary mt-1 text-center">이미지 전송됨</p>
                </div>`;
        } else if (contentType === 'file') {
            innerHTML = `
                <div class="bg-primary p-3 rounded-2xl ${isMe ? 'rounded-tr-none' : 'rounded-tl-none'} text-xs font-medium text-white shadow-sm flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">description</span> 파일 전송 완료
                </div>`;
        }

        msg.innerHTML = `
            ${innerHTML}
            <span class="text-[9px] text-zinc-400 font-bold px-1">${timeStr}</span>
        `;
        
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
        document.getElementById('attachment-menu').classList.remove('active');
    }

    function handleFileUpload(type) {
        appendMessage('', 'me', type);
    }

    window.onclick = function(event) {
        if (!event.target.closest('button') && !event.target.closest('input')) {
            document.getElementById('chat-menu-dropdown').classList.remove('active');
            document.getElementById('attachment-menu').classList.remove('active');
        }
    }

    renderFeed('personal');
  </script>
</body>
</html>
