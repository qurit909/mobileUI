<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>NanoPick - Profile Explorer</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#b6004f",
            "on-primary": "#ffffff",
            "surface": "#fff4f6",
            "on-surface": "#4a2135",
            "on-surface-variant": "#7d4d63",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#ffecf2",
            "surface-container-high": "#ffd8e7",
            "surface-container-highest": "#ffd0e3",
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .page { display: none; flex-direction: column; height: 100%; position: relative; }
    .page.active { display: flex; }
    .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .insta-grid div { aspect-ratio: 1 / 1; overflow: hidden; background-color: #fce7f3; }
    .insta-grid img { width: 100%; height: 100%; object-fit: cover; }
    .mode-btn.active { background-color: #b6004f; color: white; }
    
    #review-modal, #chat-page { display: none; }
    #review-modal.active, #chat-page.active { display: flex; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    .animate-slide-in-right { animation: slideInRight 0.3s ease-out; }

    #search-bar-container.active { display: flex !important; }

    /* 추가된 UI 스타일 */
    #chat-side-menu, #chat-action-sheet { display: none; }
    #chat-side-menu.active, #chat-action-sheet.active { display: flex; }

    /* 토글 스위치 스타일 */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #b6004f; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body class="py-0 sm:py-8">
  <div id="app-shell" class="relative w-full max-w-[400px] h-[100dvh] sm:h-[850px] bg-surface overflow-hidden sm:shadow-2xl sm:rounded-[2.5rem] border border-rose-100 flex flex-col">
    
    <!-- 홈 페이지 -->
    <section id="page-home" class="page active">
      <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 flex flex-col border-b border-rose-100 z-10">
        <div class="flex justify-between items-center w-full">
          <div class="flex items-center gap-2">
            <div class="h-8 w-8 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-sm font-black text-[10px]">N</div>
            <h1 class="text-lg font-black tracking-tighter text-zinc-900">NanoPick</h1>
          </div>
          <div class="flex items-center gap-1">
            <div class="flex bg-rose-50 p-1 rounded-full mr-1">
              <button onclick="toggleFeedMode('personal')" id="btn-personal" class="mode-btn active px-2.5 py-1 rounded-full text-[9px] font-bold transition-all">개인</button>
              <button onclick="toggleFeedMode('company')" id="btn-company" class="mode-btn px-2.5 py-1 rounded-full text-[9px] font-bold text-on-surface-variant transition-all">기업</button>
            </div>
            <button onclick="toggleSearchBar()" class="p-2 text-primary hover:bg-rose-50 rounded-full transition-colors"><span class="material-symbols-outlined">search</span></button>
          </div>
        </div>
        <!-- 검색 바 -->
        <div id="search-bar-container" class="hidden mt-3 w-full animate-slide-up flex-col">
          <div class="relative w-full">
            <input id="search-input" type="text" oninput="handleSearch(this.value)" placeholder="이름 또는 카테고리 검색..." class="w-full bg-rose-50 border-none rounded-xl px-4 py-2.5 text-xs text-on-surface focus:ring-2 focus:ring-primary/20 placeholder-rose-300 font-medium"/>
            <button onclick="toggleSearchBar()" class="absolute right-3 top-1/2 -translate-y-1/2 text-rose-300 hover:text-primary"><span class="material-symbols-outlined text-sm">close</span></button>
          </div>
        </div>
      </header>
      <main id="feed-container" class="flex-1 overflow-y-auto p-4 space-y-6 hide-scrollbar pb-24"></main>
    </section>

    <!-- 상세 프로필 오버레이 -->
    <section id="page-detail" class="page bg-white absolute inset-0 z-[60]">
      <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 flex items-center border-b border-rose-100">
        <button onclick="closeDetail()" class="text-primary mr-4"><span class="material-symbols-outlined">arrow_back_ios</span></button>
        <h1 class="font-bold text-primary tracking-tight">상세 프로필</h1>
      </header>
      <main id="detail-content" class="flex-1 overflow-y-auto hide-scrollbar pb-24"></main>
    </section>

    <!-- 리뷰 모달 -->
    <section id="review-modal" class="absolute inset-0 bg-black/40 z-[70] items-end justify-center">
      <div class="w-full bg-white rounded-t-[2.5rem] h-[80%] flex flex-col overflow-hidden animate-slide-up">
        <header class="p-6 border-b border-rose-50 flex justify-between items-center">
          <div>
            <h2 class="text-lg font-black text-on-surface">리뷰 상세</h2>
            <p id="review-total-count" class="text-xs text-on-surface-variant font-bold"></p>
          </div>
          <button onclick="closeReviewModal()" class="w-10 h-10 bg-rose-50 rounded-full flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">close</span>
          </button>
        </header>
        <div id="review-list" class="flex-1 overflow-y-auto px-6 space-y-4 py-6 hide-scrollbar">
            <!-- 리뷰 아이템 렌더링 영역 -->
        </div>
        <div class="p-4 border-t border-rose-50">
            <button id="load-more-reviews" onclick="loadMoreReviews()" class="w-full py-3 text-[10px] font-bold text-primary bg-rose-50 rounded-xl hover:bg-rose-100 transition-colors">이전 리뷰 더보기</button>
        </div>
      </div>
    </section>

    <!-- 채팅 페이지 -->
    <section id="chat-page" class="page bg-[#fff4f6] absolute inset-0 z-[80]">
      <header class="shrink-0 bg-white/80 backdrop-blur-xl px-5 py-4 border-b border-rose-100 flex items-center justify-between relative">
        <div class="flex items-center">
          <button onclick="closeChat()" class="text-primary mr-4"><span class="material-symbols-outlined">arrow_back_ios</span></button>
          <div class="flex items-center gap-3">
              <img id="chat-target-img" class="w-8 h-8 rounded-full object-cover shadow-sm" src=""/>
              <h1 id="chat-target-name" class="font-bold text-zinc-800 tracking-tight"></h1>
          </div>
        </div>
        <button onclick="toggleChatSideMenu()" class="p-2 text-primary"><span class="material-symbols-outlined">more_vert</span></button>
      </header>
      <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24 hide-scrollbar"></main>
      
      <!-- 오른쪽 상단 슬라이드 메뉴 -->
      <div id="chat-side-menu" class="absolute inset-0 bg-black/20 z-[90] flex justify-end">
        <div class="w-[80%] bg-[#f8f9fb] h-full shadow-2xl animate-slide-in-right flex flex-col">
            <div class="p-6 flex justify-between items-center">
                <span class="text-lg font-bold text-zinc-800">채팅 설정</span>
                <button onclick="toggleChatSideMenu()" class="text-zinc-400"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-5 space-y-8">
                <!-- 대화 관리 섹션 -->
                <div>
                    <h3 class="text-xs font-bold text-zinc-400 mb-3 px-1">대화 관리</h3>
                    <button class="w-full bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm hover:bg-rose-50/30 transition-colors">
                        <span class="material-symbols-outlined text-primary">search</span>
                        <span class="text-sm font-semibold text-zinc-700">대화 내용 검색</span>
                    </button>
                </div>

                <!-- 미디어 및 파일 섹션 -->
                <div>
                    <h3 class="text-xs font-bold text-zinc-400 mb-3 px-1">미디어 및 파일</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="bg-white rounded-2xl p-5 flex flex-col items-center gap-3 shadow-sm hover:bg-rose-50/30 transition-colors">
                            <span class="material-symbols-outlined text-primary scale-110">image_search</span>
                            <span class="text-[11px] font-bold text-zinc-600">사진/동영상</span>
                        </button>
                        <button class="bg-white rounded-2xl p-5 flex flex-col items-center gap-3 shadow-sm hover:bg-rose-50/30 transition-colors">
                            <span class="material-symbols-outlined text-primary scale-110">folder_open</span>
                            <span class="text-[11px] font-bold text-zinc-600">주고받은 파일</span>
                        </button>
                    </div>
                </div>

                <!-- 알림 설정 섹션 -->
                <div>
                    <h3 class="text-xs font-bold text-zinc-400 mb-3 px-1">알림 설정</h3>
                    <div class="bg-white rounded-2xl p-4 flex items-center justify-between shadow-sm">
                        <span class="text-sm font-semibold text-zinc-700">채팅 알림</span>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
      </div>

      <!-- 왼쪽 하단 슬라이드 업 메뉴 -->
      <div id="chat-action-sheet" class="absolute inset-0 bg-black/20 z-[90] items-end">
        <div class="w-full bg-white rounded-t-[2.5rem] p-6 pb-12 animate-slide-up">
            <div class="flex justify-between items-center mb-8 px-2">
                <h3 class="text-lg font-bold text-zinc-800">첨부하기</h3>
                <button onclick="toggleChatActionSheet()" class="text-zinc-400"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="toggleChatActionSheet()" class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 rounded-[1.5rem] bg-[#f0f5ff] flex items-center justify-center text-blue-500 shadow-sm transition-transform active:scale-90">
                        <span class="material-symbols-outlined scale-125">image</span>
                    </div>
                    <span class="text-[11px] font-bold text-zinc-600">갤러리</span>
                </button>
                <button onclick="toggleChatActionSheet()" class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 rounded-[1.5rem] bg-[#fff8ef] flex items-center justify-center text-orange-500 shadow-sm transition-transform active:scale-90">
                        <span class="material-symbols-outlined scale-125">photo_camera</span>
                    </div>
                    <span class="text-[11px] font-bold text-zinc-600">카메라</span>
                </button>
                <button onclick="toggleChatActionSheet()" class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 rounded-[1.5rem] bg-[#f0fff4] flex items-center justify-center text-green-500 shadow-sm transition-transform active:scale-90">
                        <span class="material-symbols-outlined scale-125">description</span>
                    </div>
                    <span class="text-[11px] font-bold text-zinc-600">파일</span>
                </button>
                <button onclick="toggleChatActionSheet()" class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 rounded-[1.5rem] bg-[#f9f2ff] flex items-center justify-center text-purple-500 shadow-sm transition-transform active:scale-90">
                        <span class="material-symbols-outlined scale-125">location_on</span>
                    </div>
                    <span class="text-[11px] font-bold text-zinc-600">위치</span>
                </button>
            </div>
        </div>
      </div>

      <div class="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-rose-100 z-[85]">
        <form onsubmit="sendMessage(event)" class="flex items-center gap-2">
            <button type="button" onclick="toggleChatActionSheet()" class="text-primary p-1 active:scale-90 transition-transform"><span class="material-symbols-outlined">add_circle</span></button>
            <div class="flex-1 flex items-center gap-2 bg-rose-50 rounded-full px-4 py-2 border border-rose-100">
                <input id="chat-input" type="text" placeholder="메시지 입력..." class="flex-1 bg-transparent border-none focus:ring-0 text-xs"/>
                <button type="submit" class="text-primary"><span class="material-symbols-outlined">send</span></button>
            </div>
        </form>
      </div>
    </section>

    <!-- 네비게이션 바 -->
    <nav class="absolute bottom-0 left-0 right-0 h-20 flex justify-around items-center px-6 pb-2 bg-white/90 backdrop-blur-xl rounded-t-[2.5rem] shadow-lg z-50">
      <button onclick="showHome()" class="nav-item active flex flex-col items-center gap-1 text-primary">
        <span class="material-symbols-outlined">home</span><span class="text-[9px] font-bold">홈</span>
      </button>
      <a href="create.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined">add_circle</span><span class="text-[9px] font-bold">만들기</span>
      </a>
      <a href="message.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400 relative">
        <span class="material-symbols-outlined">send</span>
        <span class="text-[9px] font-bold">메시지</span>
        <span class="absolute top-0 right-1 w-2 h-2 bg-primary rounded-full border border-white"></span>
      </a>
      <a href="profile.html" class="nav-item flex flex-col items-center gap-1 text-zinc-400">
        <span class="material-symbols-outlined">account_circle</span><span class="text-[9px] font-bold">프로필</span>
      </a>
    </nav>
  </div>

  <script>
    const lastNames = ["김", "이", "박", "최", "정", "강", "조", "윤", "장", "임"];
    const firstNames = ["지수", "소희", "준호", "서연", "민우", "도윤", "하은", "준서", "예린", "민준"];
    const personalCats = ["뷰티 모델", "패션 디렉터", "여행 작가", "라이프스타일", "운동 전문가", "IT 리뷰어", "푸드 커넥터"];
    
    const companyNames = ["블루칩", "모먼트", "데일리", "오브제", "시너지", "프라임", "어반", "센스", "벨벳", "뉴턴"];
    const companySuffix = ["스튜디오", "랩", "컴퍼니", "코리아", "브랜드", "하우스"];
    const companyCats = ["코스메틱", "액티브웨어", "리빙 브랜드", "F&B", "테크 가전", "패션 잡화", "에코 라이프"];

    const reviewSummaries = [
        "매우 전문적이고 결과물이 깔끔해요.",
        "감각적인 스타일링이 인상적입니다.",
        "사진의 분위기가 독보적입니다.",
        "소통이 빠르고 피드백이 정확해요.",
        "진정성 있는 콘텐츠를 만듭니다.",
        "브랜드 가이드가 명확해서 작업하기 편했습니다."
    ];

    const targets = ["2030 여성", "MZ세대 전체", "1인 가구", "직장인 운동족", "테크 얼리어답터", "반려동물 가족"];
    const channels = ["인스타그램 릴스", "유튜브 쇼츠", "블로그 리뷰", "틱톡 댄스", "인스타 피드 3장"];

    function generateProfiles(count, type) {
      const list = [];
      for(let i=1; i<=count; i++) {
        const id = type === 'personal' ? i : i + 100;
        let name, cat;
        if (type === 'personal' && i === 1) {
            name = "김지수";
            cat = "패션 디렉터";
        } else if (type === 'company' && i === 1) {
            name = "벨벳 스튜디오";
            cat = "코스메틱";
        } else {
            name = type === 'personal' 
                ? lastNames[Math.floor(Math.random()*lastNames.length)] + firstNames[Math.floor(Math.random()*firstNames.length)]
                : companyNames[Math.floor(Math.random()*companyNames.length)] + " " + companySuffix[Math.floor(Math.random()*companySuffix.length)];
            cat = type === 'personal' 
                ? personalCats[Math.floor(Math.random()*personalCats.length)]
                : companyCats[Math.floor(Math.random()*companyCats.length)];
        }
        let primaryMetric, secondaryMetric;
        if (type === 'personal') {
            primaryMetric = { label: "팔로워", value: (i === 1 ? "20.5K" : (100 + Math.floor(Math.random()*850)).toLocaleString()) };
            secondaryMetric = { label: "활동지수", value: (i === 1 ? "15.2%" : (Math.random()*12 + 1).toFixed(1) + "%") };
        } else {
            primaryMetric = { label: "진행 캠페인", value: (Math.floor(Math.random()*150) + 20) + "건" };
            secondaryMetric = { label: "평균 단가", value: (Math.floor(Math.random()*22)+3) + "만" };
        }
        list.push({
          id, type, name, category: cat,
          handle: "@" + (type === 'personal' ? "user" : "brand") + "_" + (Math.random().toString(36).substring(7)),
          img: `https://picsum.photos/seed/nanopick_${id}/400/600`,
          primaryMetric, secondaryMetric,
          response: Math.floor(Math.random()*40 + 5) + "분 내",
          reviews: Math.floor(Math.random()*60 + 5),
          rating: (Math.random()*0.8 + 4.2).toFixed(1),
          reviewSummary: reviewSummaries[Math.floor(Math.random()*reviewSummaries.length)],
          persona: type === 'personal' ? { interests: ["트렌드", "카페투어", "건강", "패션"], goal: "팔로워와의 진정성 있는 소통" } : null,
          adInfo: type === 'company' ? { period: (Math.floor(Math.random()*14)+7) + "일 이내", channel: channels[Math.floor(Math.random()*channels.length)], target: targets[Math.floor(Math.random()*targets.length)] } : null,
          portfolio: [`https://picsum.photos/seed/p_${id}1/400`, `https://picsum.photos/seed/p_${id}2/400`, `https://picsum.photos/seed/p_${id}3/400`]
        });
      }
      return list;
    }

    const personalProfiles = generateProfiles(15, 'personal');
    const companyProfiles = generateProfiles(15, 'company');
    const allProfiles = [...personalProfiles, ...companyProfiles];
    let currentMode = 'personal';
    let currentDetailId = null;

    function toggleSearchBar() {
      const container = document.getElementById('search-bar-container');
      container.classList.toggle('active');
      if (container.classList.contains('active')) document.getElementById('search-input').focus();
      else { document.getElementById('search-input').value = ''; renderFeed(currentMode); }
    }
    function handleSearch(q) { renderFeed(currentMode, q.toLowerCase()); }
    function toggleFeedMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+mode));
      renderFeed(mode);
    }
    function renderFeed(filter, query = '') {
      const container = document.getElementById('feed-container');
      const filtered = allProfiles.filter(p => p.type === filter && (p.name.includes(query) || p.category.includes(query)));
      let adHtml = '';
      if (filter === 'personal') {
        const adTarget = companyProfiles[0]; 
        adHtml = `<div class="bg-gradient-to-br from-rose-500 to-primary rounded-[2rem] p-5 shadow-lg mb-6 relative overflow-hidden group"><div class="absolute top-0 right-0 p-3"><span class="bg-white/20 text-white text-[8px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Sponsored</span></div><div class="relative z-10"><h4 class="text-white font-black text-lg mb-1 leading-tight">신규 브랜드 입점!<br/>협업 파트너 모집 중</h4><p class="text-rose-100 text-[10px] font-medium mb-4">지금 '${adTarget.name}'와 첫 캠페인을 시작해보세요.</p><button onclick="openDetail(${adTarget.id})" class="bg-white text-primary px-4 py-2 rounded-xl text-[10px] font-black shadow-sm group-hover:scale-105 transition-transform">신청하기</button></div><div class="absolute -bottom-4 -right-4 w-24 h-24 bg-white/10 rounded-full blur-2xl"></div></div>`;
      } else {
        const adTarget = personalProfiles[0];
        adHtml = `<div class="bg-white rounded-[2rem] border-2 border-primary/20 p-5 shadow-sm mb-6 relative overflow-hidden group"><div class="absolute top-0 right-0 p-3"><span class="bg-primary/10 text-primary text-[8px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Ad</span></div><div class="flex items-center gap-4"><div class="w-16 h-16 rounded-2xl overflow-hidden shadow-inner"><img src="${adTarget.img}" class="w-full h-full object-cover"/></div><div class="flex-1"><h4 class="text-on-surface font-black text-sm mb-0.5">이달의 라이징 크리에이터</h4><p class="text-on-surface-variant text-[10px] font-medium mb-2">#${adTarget.name.substring(1)} #${adTarget.category.split(' ')[0]} #팔로워_${adTarget.primaryMetric.value}</p><div class="flex gap-2"><button onclick="openDetail(${adTarget.id})" class="text-[9px] font-bold text-primary underline underline-offset-2">포트폴리오 보기</button></div></div></div></div>`;
      }
      if(filtered.length === 0) { container.innerHTML = adHtml + `<div class="py-20 text-center text-rose-300 font-bold">결과를 찾을 수 없습니다.</div>`; return; }
      container.innerHTML = adHtml + filtered.map(p => {
        const isPersonal = p.type === 'personal';
        const unitLabel = isPersonal ? '' : '원';
        return `<article class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-rose-50 hover:border-rose-200 transition-colors"><img class="w-full h-80 object-cover" src="${p.img}" loading="lazy"/><div class="p-6"><div class="flex justify-between items-start mb-4"><div class="flex-1"><div class="flex items-center gap-2 mb-1"><h2 class="text-xl font-bold text-on-surface truncate">${p.name}</h2><span class="shrink-0 bg-rose-100 text-primary text-[9px] px-2 py-0.5 rounded-full font-bold">${p.category}</span></div><p class="text-xs text-on-surface-variant font-medium">${p.handle}</p></div><div class="flex items-center gap-1 bg-rose-50 px-2 py-1 rounded-lg text-primary font-bold text-xs"><span class="material-symbols-outlined text-sm">star</span>${p.rating}</div></div><div class="grid grid-cols-2 gap-3 mb-5 text-center"><div class="bg-rose-50/50 p-3 rounded-2xl border border-rose-100/50"><p class="text-[9px] font-bold text-on-surface-variant uppercase mb-1">${p.primaryMetric.label}</p><p class="text-sm font-black text-on-surface">${p.primaryMetric.value}</p></div><div class="bg-rose-50/50 p-3 rounded-2xl border border-rose-100/50"><p class="text-[9px] font-bold text-on-surface-variant uppercase mb-1">${p.secondaryMetric.label}</p><p class="text-sm font-black text-primary">${p.secondaryMetric.value}${unitLabel}</p></div></div><button onclick="openDetail(${p.id})" class="w-full py-4 bg-primary text-white text-sm font-bold rounded-2xl active:scale-95 transition-transform shadow-md">상세 프로필 보기</button></div></article>`;
      }).join('');
    }
    function openDetail(id) {
      currentDetailId = id;
      const p = allProfiles.find(x => x.id === id);
      if (!p) return;
      const isCo = p.type === 'company';
      const unitLabel = isCo ? '원' : '';
      document.getElementById('detail-content').innerHTML = `<div class="px-6 py-8"><div class="flex items-center gap-5 mb-8"><img class="w-20 h-20 rounded-2xl object-cover border border-rose-100 shadow-sm" src="${p.img}"/><div><h2 class="text-2xl font-black text-on-surface">${p.name}</h2><p class="text-sm font-bold text-primary mb-1">${p.handle}</p><div class="flex items-center gap-2"><span class="text-xs font-bold text-on-surface">${p.rating}점</span><span class="text-[10px] text-zinc-400 font-medium">(${p.reviews}개의 리뷰)</span></div></div></div><div onclick="openReviewModal()" class="bg-surface-container-low p-5 rounded-[1.5rem] border border-rose-100 mb-6 cursor-pointer active:scale-[0.98] transition-all group"><div class="flex justify-between items-center mb-2"><h3 class="text-[10px] font-black text-primary uppercase flex items-center gap-1"><span class="material-symbols-outlined text-sm">chat_bubble</span> 리뷰 요약</h3><span class="material-symbols-outlined text-primary text-sm group-hover:translate-x-1 transition-transform">arrow_forward_ios</span></div><p class="text-xs text-on-surface font-medium italic leading-relaxed">"${p.reviewSummary}"</p></div><div class="bg-white p-5 rounded-2xl border border-rose-50 shadow-sm mb-6"><h3 class="text-[10px] font-black text-zinc-400 uppercase mb-4 tracking-widest">${isCo ? 'Campaign Details' : 'Creator Info'}</h3>${isCo ? `<div class="space-y-3"><div class="flex justify-between text-xs border-b border-rose-50 pb-2"><span class="font-bold text-zinc-500">평균 캠페인 단가</span><span class="font-black text-primary">${p.secondaryMetric.value}${unitLabel}</span></div><div class="flex justify-between text-xs border-b border-rose-50 pb-2"><span class="font-bold text-zinc-500">주요 타겟</span><span class="font-bold">${p.adInfo.target}</span></div><div class="flex justify-between text-xs border-b border-rose-50 pb-2"><span class="font-bold text-zinc-500">선호 채널</span><span class="font-bold">${p.adInfo.channel}</span></div><div class="flex justify-between text-xs"><span class="font-bold text-zinc-500">응답 속도</span><span class="font-bold text-zinc-900">${p.response}</span></div></div>` : `<div class="space-y-2 text-xs"><p><span class="font-bold text-zinc-500 w-16 inline-block">활동지수</span> <span class="text-primary font-black">${p.secondaryMetric.value}</span></p><p><span class="font-bold text-zinc-500 w-16 inline-block">관심사</span> <span class="text-on-surface">${p.persona.interests.join(', ')}</span></p><p><span class="font-bold text-zinc-500 w-16 inline-block">목표</span> <span class="text-on-surface">${p.persona.goal}</span></p></div>`}</div><div class="mb-6"><h3 class="text-[10px] font-black text-zinc-400 uppercase mb-4 tracking-widest">Gallery</h3><div class="insta-grid rounded-xl overflow-hidden shadow-sm">${p.portfolio.map(u => `<div><img src="${u}" loading="lazy"/></div>`).join('')}</div></div><button onclick="openChat()" class="w-full bg-primary text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined">send</span> 협업 제안하기</button></div>`;
      document.getElementById('page-detail').classList.add('active');
    }
    function createReviewElement(review) {
      return `<div class="p-4 bg-rose-50/30 rounded-2xl border border-rose-100 animate-slide-up"><div class="flex justify-between items-center mb-2"><span class="text-xs font-black text-on-surface">${review.user}</span><span class="text-[10px] text-rose-300 font-medium">${review.date}</span></div><p class="text-xs text-on-surface-variant font-medium leading-relaxed">${review.text}</p></div>`;
    }
    function openReviewModal() {
      const p = allProfiles.find(x => x.id === currentDetailId);
      if (!p) return;
      document.getElementById('review-total-count').innerText = `총 ${p.reviews}개의 리뷰`;
      const reviewList = document.getElementById('review-list');
      const initialReviews = [{ user: "User_A", text: "정말 만족스러운 작업이었어요! 강추합니다.", date: "2024.03.15" }, { user: "Brand_B", text: "커뮤니케이션이 너무 잘 되어서 편했습니다.", date: "2024.03.10" }, { user: "Partner_C", text: "결과물 퀄리티가 예상보다 훨씬 높아요.", date: "2024.03.01" }];
      reviewList.innerHTML = initialReviews.map(r => createReviewElement(r)).join('');
      document.getElementById('load-more-reviews').style.display = "block";
      document.getElementById('review-modal').classList.add('active');
    }
    function loadMoreReviews() {
      const btn = document.getElementById('load-more-reviews');
      btn.innerText = "불러오는 중..."; btn.disabled = true;
      setTimeout(() => {
        const reviewList = document.getElementById('review-list');
        const moreReviews = [{ user: "Client_X", text: "요청사항을 정확히 이해하고 작업해주셨어요.", date: "2024.02.20" }, { user: "Manager_Y", text: "마감 기한을 엄수하고 꼼꼼한 피드백이 좋았습니다.", date: "2024.02.15" }];
        moreReviews.forEach(r => { const div = document.createElement('div'); div.innerHTML = createReviewElement(r); reviewList.appendChild(div.firstElementChild); });
        btn.innerText = "이전 리뷰 더보기"; btn.disabled = false;
        reviewList.parentElement.scrollTop = reviewList.parentElement.scrollHeight;
      }, 600);
    }
    function closeReviewModal() { document.getElementById('review-modal').classList.remove('active'); }
    function openChat() {
      const p = allProfiles.find(x => x.id === currentDetailId);
      document.getElementById('chat-target-img').src = p.img;
      document.getElementById('chat-target-name').innerText = p.name;
      document.getElementById('chat-messages').innerHTML = `<div class="text-center py-2"><span class="bg-rose-100/50 text-rose-400 text-[10px] px-3 py-1 rounded-full font-bold">비즈니스 채팅 시작</span></div>`;
      document.getElementById('chat-page').classList.add('active');
    }
    function toggleChatSideMenu() {
        document.getElementById('chat-side-menu').classList.toggle('active');
    }
    function toggleChatActionSheet() {
        document.getElementById('chat-action-sheet').classList.toggle('active');
    }
    function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if(!text) return;
      const container = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = "self-end max-w-[85%] bg-primary text-white p-3 rounded-2xl rounded-tr-none text-xs font-medium shadow-sm animate-slide-up";
      msg.innerText = text;
      container.appendChild(msg);
      input.value = '';
      container.scrollTop = container.scrollHeight;
    }
    function closeDetail() { document.getElementById('page-detail').classList.remove('active'); }
    function closeChat() { 
        document.getElementById('chat-page').classList.remove('active'); 
        document.getElementById('chat-side-menu').classList.remove('active');
        document.getElementById('chat-action-sheet').classList.remove('active');
    }
    function showHome() { closeDetail(); closeChat(); }
    renderFeed('personal');
  </script>
</body>
</html>
